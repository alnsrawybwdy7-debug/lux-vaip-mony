<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة LUX_VAIP | النسخة الاحترافية</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; color: #1e293b; text-align: right; }
        .stat-card { background: white; border-radius: 1rem; padding: 15px; border-right: 5px solid #6366f1; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; position: relative; }
        input { border: 1px solid #cbd5e1; border-radius: 0.75rem; padding: 10px; font-size: 14px; width: 100%; outline: none; text-align: right; }
        .flavor-tag { background: #e0e7ff; color: #4338ca; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; margin: 2px; display: inline-block; border: 1px solid #c7d2fe; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .btn-choice { width: 100%; padding: 14px; border-radius: 15px; margin-bottom: 8px; font-weight: 900; text-align: center; transition: 0.2s; border: 1px solid transparent; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="authOverlay" class="fixed inset-0 bg-slate-900 z-[999] flex flex-col items-center justify-center">
        <div class="w-12 h-12 bg-indigo-600 rounded-xl mb-6 flex items-center justify-center"><i class="fas fa-user-shield text-white text-xl"></i></div>
        <input type="password" id="adminPass" placeholder="رمز الدخول" class="max-w-[200px] text-center mb-4 bg-white/10 text-white border-white/20">
        <button onclick="checkAuth()" class="bg-indigo-600 text-white px-12 py-2 rounded-xl font-bold">دخول</button>
    </div>

    <div id="sellModal" class="modal">
        <div class="bg-white p-6 rounded-[2rem] w-full max-w-md shadow-2xl border-t-8 border-indigo-600">
            <div id="sellOptions" class="space-y-2 max-h-[450px] overflow-y-auto p-1"></div>
            <button onclick="document.getElementById('sellModal').style.display='none'" class="w-full mt-4 text-slate-400 font-bold text-xs">إلغاء ✕</button>
        </div>
    </div>

    <div id="mainContent" class="opacity-0 transition-opacity duration-700">
        <div class="flex justify-between items-center mb-6">
            <button onclick="logout()" class="text-red-500 text-sm font-bold">خروج</button>
            <h1 class="text-xl font-black italic text-slate-800 underline decoration-indigo-500">لوحة تحكم LUX_VAIP</h1>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="stat-card"><p class="text-green-600 text-[10px] font-bold">الكاش المستلم</p><h2 id="totalCash" class="text-lg font-black text-green-700">0</h2></div>
            <div class="stat-card"><p class="text-indigo-600 text-[10px] font-bold">صافي الأرباح</p><h2 id="soldProfit" class="text-lg font-black text-indigo-700">0</h2></div>
            <div class="stat-card" style="border-right-color: #f43f5e;"><p class="text-rose-600 text-[10px] font-bold">إجمالي الديون</p><h2 id="totalDebts" class="text-lg font-black text-rose-700">0</h2></div>
            <div class="stat-card" style="border-right-color: #64748b;"><p class="text-slate-400 text-[10px] font-bold">قطع المخزن</p><h2 id="totalQty" class="text-lg font-black text-slate-700">0</h2></div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-10 border border-rose-100">
            <h3 class="font-black mb-4 text-rose-600 italic uppercase">حسابات المديونين</h3>
            <div id="debtTableBody" class="space-y-2"></div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-10 border border-slate-200">
            <h3 class="font-black mb-4 text-indigo-600 italic uppercase">إضافة بضاعة جديدة</h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
                <input type="text" id="p_name" placeholder="اسم الجهاز">
                <input type="number" id="p_cost" placeholder="سعر الكلفة">
                <input type="number" id="p_sell" placeholder="سعر البيع">
                <input type="file" accept="image/*" onchange="previewImage(this)" class="text-[10px] p-1 border-dashed">
            </div>
            <div class="bg-indigo-50 p-4 rounded-xl mb-4">
                <div class="flex gap-2">
                    <input type="text" id="f_name" placeholder="النكهة" class="bg-white">
                    <input type="number" id="f_qty" placeholder="العدد" class="bg-white w-20 text-center">
                    <button onclick="addFlavorToList()" class="bg-indigo-600 text-white px-6 rounded-xl font-bold">+</button>
                </div>
                <div id="tempFlavors" class="mt-3 flex flex-wrap"></div>
            </div>
            <button onclick="saveProduct()" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl shadow-xl">حفظ المنتج ورفع للمتجر 🚀</button>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <h3 class="font-black mb-4 italic text-slate-500 underline uppercase">المخزن الحالي</h3>
            <div class="overflow-x-auto"><table class="min-w-full text-right"><thead><tr class="text-[10px] text-slate-400 border-b"><th>المنتج</th><th>النكهات</th><th>البيع</th><th>إجراء</th></tr></thead><tbody id="pTableBody"></tbody></table></div>
        </div>
    </div>

    <script>
        const CORRECT_PASS = "1221";
        let db, base64Img = "", currentFlavors = [], allLiveProducts = {}, allLiveDebts = {}, currentSale = {};

        window.onload = () => { if (localStorage.getItem('admin_logged_in') === 'true') { document.getElementById('authOverlay').style.display = 'none'; document.getElementById('mainContent').classList.remove('opacity-0'); initFirebase(); } };
        function checkAuth() { if (document.getElementById('adminPass').value === CORRECT_PASS) { localStorage.setItem('admin_logged_in', 'true'); location.reload(); } else alert("خطأ!"); }
        function logout() { localStorage.removeItem('admin_logged_in'); location.reload(); }

        function initFirebase() {
            const firebaseConfig = { apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc", databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/", projectId: "lux-vaip" };
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            loadLive();
        }

        const irqPrice = (n) => new Intl.NumberFormat('ar-IQ').format(n) + " د.ع";

        window.previewImage = (i) => { const r = new FileReader(); r.onload = (e) => base64Img = e.target.result; r.readAsDataURL(i.files[0]); };

        window.addFlavorToList = () => {
            const n = document.getElementById('f_name').value, q = Number(document.getElementById('f_qty').value);
            if (n && q > 0) { currentFlavors.push({ name: n, qty: q }); renderTemp(); }
        };

        function renderTemp() { document.getElementById('tempFlavors').innerHTML = currentFlavors.map((f, i) => `<span class="flavor-tag">${f.name} (${f.qty})</span>`).join(''); }

        function loadLive() {
            db.ref().on('value', snap => {
                const data = snap.val() || {};
                const prods = data.products || {}; allLiveProducts = prods;
                const stats = data.stats || { cash: 0, profit: 0 };
                const debts = data.debts || {}; allLiveDebts = debts;

                document.getElementById('totalCash').innerText = irqPrice(stats.cash);
                document.getElementById('soldProfit').innerText = irqPrice(stats.profit);

                const pt = document.getElementById('pTableBody'); pt.innerHTML = ''; let tQty = 0;
                Object.keys(prods).forEach(id => {
                    const p = prods[id]; let pq = 0;
                    let fHtml = p.flavors ? p.flavors.map(f => { pq += f.qty; return `<span class="flavor-tag">${f.name} (${f.qty})</span>` }).join('') : '';
                    tQty += pq;
                    pt.innerHTML += `<tr class="border-b"><td><b>${p.name}</b></td><td>${fHtml}</td><td class="font-bold text-green-600">${irqPrice(p.sell)}</td><td><button onclick="openSellMenu('${id}')" class="bg-green-500 text-white px-3 py-1 rounded text-[10px]">بيع</button></td></tr>`;
                });
                document.getElementById('totalQty').innerText = tQty;

                const dt = document.getElementById('debtTableBody'); dt.innerHTML = ''; let tdSum = 0;
                Object.keys(debts).forEach(id => {
                    const d = debts[id]; tdSum += d.amount;
                    dt.innerHTML += `<div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border">
                        <div><b>${d.name}</b><br><small class="text-[9px] text-slate-400">${d.details}</small></div>
                        <div class="flex gap-2">
                            <span class="text-rose-600 font-black">${irqPrice(d.amount)}</span>
                            <button onclick="returnToStockAndDelete('${id}')" class="bg-rose-50 text-rose-500 px-3 py-1 rounded-lg text-[10px] font-bold border border-rose-100">حذف وإرجاع للمخزن</button>
                        </div>
                    </div>`;
                });
                document.getElementById('totalDebts').innerText = irqPrice(tdSum);
            });
        }

        // --- نظام البيع الذكي ---
        window.openSellMenu = (id) => {
            const p = allLiveProducts[id]; currentSale.id = id;
            const container = document.getElementById('sellOptions');
            container.innerHTML = `<h3 class="text-center font-bold mb-4">اختر النكهة</h3>`;
            p.flavors.forEach((f, fIdx) => {
                container.innerHTML += `<button onclick="stepTwo(${fIdx})" class="btn-choice bg-indigo-50 border-indigo-100">${f.name} (${f.qty})</button>`;
            });
            document.getElementById('sellModal').style.display = 'flex';
        };

        window.stepTwo = (fIdx) => {
            currentSale.fIdx = fIdx;
            const container = document.getElementById('sellOptions');
            container.innerHTML = `<button onclick="finalSale('CASH')" class="btn-choice bg-green-500 text-white">💰 بيع كاش</button>
                                   <button onclick="showNewDebtInput()" class="btn-choice bg-slate-800 text-white">👤 مديون جديد</button>`;
        };

        window.showNewDebtInput = () => {
            const container = document.getElementById('sellOptions');
            container.innerHTML = `<input type="text" id="new_debtor_name" placeholder="اسم المديون..." class="mb-4 text-center">
                                   <button onclick="finalSale('NEW', document.getElementById('new_debtor_name').value)" class="btn-choice bg-indigo-600 text-white">تأكيد الدين</button>`;
        };

        window.finalSale = async (type, extra) => {
            const id = currentSale.id; const p = allLiveProducts[id]; const fIdx = currentSale.fIdx;
            const flavor = p.flavors[fIdx];
            
            // خصم من المخزن
            flavor.qty -= 1;
            const updatedFlavors = p.flavors.filter(f => f.qty > 0);
            await db.ref('products/' + id).update({ flavors: updatedFlavors });

            if (type === 'CASH') {
                const s = (await db.ref('stats').once('value')).val() || { cash: 0, profit: 0 };
                await db.ref('stats').set({ cash: s.cash + p.sell, profit: s.profit + (p.sell - p.cost) });
            } else {
                // حفظ كود المنتج واسم النكهة في الدين لضمان الإرجاع
                await db.ref('debts').push({ 
                    name: extra, 
                    amount: p.sell, 
                    details: `${p.name} - ${flavor.name}`,
                    pId: id, // كود المنتج
                    fName: flavor.name // اسم النكهة
                });
            }
            document.getElementById('sellModal').style.display = 'none';
        };

        // --- الحذف والإرجاع المضمون ---
        window.returnToStockAndDelete = async (debtId) => {
            const debt = allLiveDebts[debtId];
            if (!confirm(`هل تريد حذف دين ${debt.name} وإرجاع القطعة للمخزن؟`)) return;

            const pId = debt.pId;
            const fName = debt.fName;

            if (pId && fName) {
                const snap = await db.ref('products/' + pId).once('value');
                if (snap.exists()) {
                    let p = snap.val();
                    let flavors = p.flavors || [];
                    let found = false;

                    // ابحث عن النكهة بالاسم وزد عددها
                    flavors.forEach(f => {
                        if (f.name === fName) {
                            f.qty += 1;
                            found = true;
                        }
                    });

                    // إذا كانت النكهة محذوفة (كانت صفر)، أعد إضافتها
                    if (!found) {
                        flavors.push({ name: fName, qty: 1 });
                    }

                    await db.ref('products/' + pId).update({ flavors: flavors });
                }
            }

            await db.ref('debts/' + debtId).remove();
            alert("تم الإرجاع للمخزن وحذف الدين.");
        };

        window.saveProduct = () => {
            const n = document.getElementById('p_name').value, s = Number(document.getElementById('p_sell').value), c = Number(document.getElementById('p_cost').value);
            if (!n || !s || currentFlavors.length === 0) return alert("اكمل البيانات!");
            db.ref('products').push({ name: n, sell: s, cost: c, img: base64Img, flavors: currentFlavors });
            currentFlavors = []; renderTemp();
        };
    </script>
</body>
</html>
