<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة LUX_VAIP | النسخة الاحترافية</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .stat-card { background: white; border-radius: 1rem; padding: 20px; border-right: 5px solid #6366f1; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .flavor-tag { background: #eef2ff; color: #4338ca; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; margin: 2px; display: inline-block; border: 1px solid #c7d2fe; }
    </style>
</head>
<body class="p-4 md:p-8">
    <h1 class="text-3xl font-black mb-10 text-center text-slate-800 underline decoration-indigo-500 decoration-4 italic">لوحة تحكم LUX_VAIP</h1>

    <div class="max-w-5xl mx-auto bg-white p-8 rounded-3xl shadow-xl border border-slate-200 mb-10 text-right">
        <h3 class="font-black text-indigo-600 mb-6 text-xl"><i class="fas fa-plus-circle ml-2"></i> إضافة جهاز جديد للمتجر</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="flex flex-col gap-1"><label class="text-xs font-bold text-slate-500 mr-2">اسم الجهاز</label><input type="text" id="p_name" class="border p-3 rounded-xl outline-none focus:border-indigo-500"></div>
            <div class="flex flex-col gap-1"><label class="text-xs font-bold text-slate-500 mr-2">سعر الكلفة</label><input type="number" id="p_cost" class="border p-3 rounded-xl outline-none focus:border-indigo-500"></div>
            <div class="flex flex-col gap-1"><label class="text-xs font-bold text-slate-500 mr-2">سعر البيع للزبون</label><input type="number" id="p_sell" class="border p-3 rounded-xl outline-none focus:border-indigo-500"></div>
            <div class="flex flex-col gap-1"><label class="text-xs font-bold text-slate-500 mr-2">صورة المنتج</label><input type="file" accept="image/*" onchange="previewImage(this)" class="text-xs p-2"></div>
        </div>

        <div class="bg-indigo-50 p-6 rounded-2xl mb-6 border border-indigo-100">
            <p class="text-sm font-black text-indigo-700 mb-4">قسم النكهات المتاحة لهذا الجهاز:</p>
            <div class="flex flex-wrap gap-3">
                <input type="text" id="f_name" placeholder="اسم النكهة (رقي، عنب..)" class="p-3 rounded-xl flex-grow outline-none">
                <input type="number" id="f_qty" placeholder="العدد" class="p-3 rounded-xl w-24 outline-none">
                <button onclick="addFlavor()" class="bg-indigo-600 text-white px-8 rounded-xl font-black shadow-lg hover:bg-indigo-700 transition">+</button>
            </div>
            <div id="tempFlavors" class="mt-4 flex flex-wrap"></div>
        </div>
        <button onclick="saveProduct()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-lg hover:bg-black transition-all shadow-xl">رفع البيانات للسيرفر الرئيسي 🚀</button>
    </div>

    <div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-lg border border-slate-200 overflow-hidden">
        <div class="bg-slate-50 p-4 border-b font-black text-slate-500 text-right italic">المخزون المتصل حالياً بالمتجر</div>
        <div class="overflow-x-auto">
            <table class="w-full text-right">
                <thead class="bg-slate-50 text-slate-400 text-xs uppercase font-bold">
                    <tr><th class="p-4">الجهاز</th><th>النكهات المتوفرة</th><th>سعر البيع</th><th>إجراء</th></tr>
                </thead>
                <tbody id="pTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc",
            databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/",
            projectId: "lux-vaip"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let base64Img = "";
        let currentFlavors = [];

        function previewImage(input) {
            const reader = new FileReader();
            reader.onload = (e) => base64Img = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }

        function addFlavor() {
            const n = document.getElementById('f_name').value;
            const q = Number(document.getElementById('f_qty').value);
            if(n && q > 0) {
                currentFlavors.push({ name: n, qty: q });
                document.getElementById('f_name').value = '';
                document.getElementById('f_qty').value = '';
                renderTemp();
            }
        }

        function renderTemp() {
            document.getElementById('tempFlavors').innerHTML = currentFlavors.map((f, i) => `<span class="flavor-tag">${f.name} (${f.qty}) <i class="fas fa-times mr-2 cursor-pointer text-red-500" onclick="currentFlavors.splice(${i},1);renderTemp()"></i></span>`).join('');
        }

        function saveProduct() {
            const name = document.getElementById('p_name').value;
            const sell = document.getElementById('p_sell').value;
            if(!name || currentFlavors.length === 0) return alert("يرجى إدخال الاسم والنكهات!");

            db.ref('products').push({
                name, sell, cost: document.getElementById('p_cost').value,
                img: base64Img, flavors: currentFlavors,
                timestamp: Date.now()
            });
            
            alert("تم الرفع بنجاح! سيظهر الآن في المتجر.");
            location.reload();
        }

        db.ref('products').on('value', snap => {
            const tbody = document.getElementById('pTableBody');
            tbody.innerHTML = '';
            snap.forEach(child => {
                const p = child.val();
                let fHtml = p.flavors ? p.flavors.map(f => `<span class="flavor-tag">${f.name} (${f.qty})</span>`).join('') : 'لا يوجد';
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50 transition">
                        <td class="p-4 flex items-center gap-3 font-black text-slate-700"><img src="${p.img}" class="w-12 h-12 rounded-xl object-cover">${p.name}</td>
                        <td>${fHtml}</td>
                        <td class="font-black text-green-600">${Number(p.sell).toLocaleString()} د.ع</td>
                        <td><button onclick="db.ref('products/${child.key}').remove()" class="bg-red-50 text-red-500 p-2 rounded-lg hover:bg-red-500 hover:text-white transition"><i class="fas fa-trash"></i></button></td>
                    </tr>`;
            });
        });
    </script>
</body>
</html>
