<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة LUX_VAIP | النسخة المطلوبة</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; color: #1e293b; text-align: right; }
        .stat-card { background: white; border-radius: 1rem; padding: 15px; border-right: 5px solid #6366f1; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; position: relative; }
        input { border: 1px solid #cbd5e1; border-radius: 0.75rem; padding: 10px; width: 100%; outline: none; text-align: right; }
        .flavor-tag { background: #e0e7ff; color: #4338ca; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; margin: 2px; display: inline-block; border: 1px solid #c7d2fe; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .btn-choice { width: 100%; padding: 14px; border-radius: 15px; margin-bottom: 8px; font-weight: 900; text-align: center; transition: 0.2s; border: 1px solid transparent; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- شاشة الدخول -->
    <div id="authOverlay" class="fixed inset-0 bg-slate-900 z-[999] flex flex-col items-center justify-center">
        <input type="password" id="adminPass" placeholder="رمز الدخول" class="max-w-[200px] text-center mb-4 bg-white/10 text-white border-white/20">
        <button onclick="checkAuth()" class="bg-indigo-600 text-white px-12 py-2 rounded-xl font-bold">دخول</button>
    </div>

    <!-- مودال البيع -->
    <div id="sellModal" class="modal">
        <div class="bg-white p-6 rounded-[2rem] w-full max-w-md shadow-2xl">
            <div id="sellOptions" class="space-y-2"></div>
            <button onclick="closeModals()" class="w-full mt-4 text-slate-400 font-bold text-xs">إلغاء ✕</button>
        </div>
    </div>

    <!-- مودال التعديل -->
    <div id="editModal" class="modal">
        <div class="bg-white p-6 rounded-[2rem] w-full max-w-md shadow-2xl">
            <h3 class="font-bold mb-4 text-indigo-600">تعديل المنتج</h3>
            <input type="hidden" id="edit_id">
            <div class="space-y-3">
                <input type="number" id="edit_cost" placeholder="سعر الكلفة الجديد">
                <input type="number" id="edit_sell" placeholder="سعر البيع الجديد">
                <div id="edit_flavors_area" class="space-y-2 max-h-40 overflow-auto border-t pt-2"></div>
            </div>
            <button onclick="saveEdit()" class="w-full mt-4 bg-indigo-600 text-white py-3 rounded-xl font-bold">حفظ التغييرات</button>
            <button onclick="closeModals()" class="w-full mt-2 text-slate-400 text-xs">إلغاء</button>
        </div>
    </div>

    <div id="mainContent" class="opacity-0 transition-opacity duration-700">
        <div class="flex justify-between items-center mb-6">
            <button onclick="logout()" class="text-red-500 text-sm font-bold">خروج</button>
            <h1 class="text-xl font-black italic text-slate-800 underline decoration-indigo-500 uppercase">لوحة تحكم LUX_VAIP</h1>
        </div>

        <!-- الإحصائيات -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="stat-card"><p class="text-green-600 text-[10px] font-bold">الكاش</p><h2 id="totalCash" class="text-lg font-black text-green-700">0</h2></div>
            <div class="stat-card"><p class="text-indigo-600 text-[10px] font-bold">الأرباح</p><h2 id="soldProfit" class="text-lg font-black text-indigo-700">0</h2></div>
            <div class="stat-card" style="border-right-color: #f43f5e;"><p class="text-rose-600 text-[10px] font-bold">الديون</p><h2 id="totalDebts" class="text-lg font-black text-rose-700">0</h2></div>
            <div class="stat-card" style="border-right-color: #64748b;"><p class="text-slate-400 text-[10px] font-bold">المخزن</p><h2 id="totalQty" class="text-lg font-black text-slate-700">0</h2></div>
        </div>

        <!-- سجل الديون -->
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-10 border border-rose-100">
            <h3 class="font-black mb-4 text-rose-600 italic">سجل المديونين</h3>
            <div id="debtTableBody" class="space-y-2"></div>
        </div>

        <!-- إضافة بضاعة -->
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-10 border border-slate-200">
            <h3 class="font-black mb-4 text-indigo-600 italic">إضافة بضاعة جديدة</h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
                <input type="text" id="p_name" placeholder="اسم الجهاز">
                <input type="number" id="p_cost" placeholder="سعر الكلفة">
                <input type="number" id="p_sell" placeholder="سعر البيع">
            </div>
            <div class="bg-indigo-50 p-4 rounded-xl mb-4">
                <div class="flex gap-2">
                    <input type="text" id="f_name" placeholder="النكهة" class="bg-white">
                    <input type="number" id="f_qty" placeholder="العدد" class="bg-white w-20 text-center">
                    <button onclick="addFlavorToList()" class="bg-indigo-600 text-white px-6 rounded-xl font-bold">+</button>
                </div>
                <div id="tempFlavors" class="mt-3 flex flex-wrap"></div>
            </div>
            <button onclick="saveProduct()" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl shadow-xl">حفظ المنتج 🚀</button>
        </div>

        <!-- المخزن -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <h3 class="font-black mb-4 italic text-slate-500 underline uppercase">المخزن الحالي</h3>
            <div class="overflow-x-auto">
                <table class="min-w-full text-right">
                    <thead><tr class="text-[10px] text-slate-400 border-b"><th>المنتج</th><th>النكهات</th><th>البيع</th><th>إجراء</th></tr></thead>
                    <tbody id="pTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const PASS = "1221";
        let db, currentFlavors = [], allLiveProducts = {}, allLiveDebts = {}, currentSale = {};

        window.onload = () => { if (localStorage.getItem('admin_log') === 'true') { document.getElementById('authOverlay').style.display = 'none'; document.getElementById('mainContent').classList.remove('opacity-0'); initFirebase(); } };
        function checkAuth() { if (document.getElementById('adminPass').value === PASS) { localStorage.setItem('admin_log', 'true'); location.reload(); } else alert("خطأ!"); }
        function logout() { localStorage.removeItem('admin_log'); location.reload(); }

        function initFirebase() {
            const config = { apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc", databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/" };
            firebase.initializeApp(config);
            db = firebase.database();
            loadLive();
        }

        const irq = (n) => new Intl.NumberFormat('ar-IQ').format(n) + " د.ع";

        function addFlavorToList() {
            const n = document.getElementById('f_name').value, q = Number(document.getElementById('f_qty').value);
            if (n && q > 0) { currentFlavors.push({ name: n, qty: q }); renderTemp(); }
        }

        function renderTemp() { document.getElementById('tempFlavors').innerHTML = currentFlavors.map(f => `<span class="flavor-tag">${f.name} (${f.qty})</span>`).join(''); }

        function loadLive() {
            db.ref().on('value', snap => {
                const data = snap.val() || {};
                allLiveProducts = data.products || {};
                allLiveDebts = data.debts || {};
                const stats = data.stats || { cash: 0, profit: 0 };

                document.getElementById('totalCash').innerText = irq(stats.cash);
                document.getElementById('soldProfit').innerText = irq(stats.profit);

                const pt = document.getElementById('pTableBody'); pt.innerHTML = ''; let tQty = 0;
                Object.keys(allLiveProducts).forEach(id => {
                    const p = allLiveProducts[id]; let pq = 0;
                    let fHtml = p.flavors ? p.flavors.map(f => { pq += f.qty; return `<span class="flavor-tag">${f.name} (${f.qty})</span>` }).join('') : '';
                    tQty += pq;
                    pt.innerHTML += `<tr class="border-b">
                        <td class="py-2"><b>${p.name}</b></td>
                        <td>${fHtml}</td>
                        <td class="font-bold text-green-600">${irq(p.sell)}</td>
                        <td class="flex gap-1 py-2">
                            <button onclick="openSellMenu('${id}')" class="bg-green-500 text-white px-2 py-1 rounded text-[10px]">بيع</button>
                            <button onclick="openEditModal('${id}')" class="bg-indigo-500 text-white px-2 py-1 rounded text-[10px]">تعديل</button>
                            <button onclick="db.ref('products/${id}').remove()" class="text-slate-300 px-1"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
                });
                document.getElementById('totalQty').innerText = tQty;

                const dt = document.getElementById('debtTableBody'); dt.innerHTML = ''; let tdSum = 0;
                Object.keys(allLiveDebts).forEach(id => {
                    const d = allLiveDebts[id]; tdSum += d.amount;
                    dt.innerHTML += `<div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border">
                        <div><b>${d.name}</b><br><small class="text-slate-400">${d.details}</small></div>
                        <div class="flex gap-2 items-center">
                            <span class="text-rose-600 font-bold">${irq(d.amount)}</span>
                            <button onclick="returnItemAndDeleteDebt('${id}')" class="bg-rose-100 text-rose-600 px-3 py-1 rounded-lg text-[10px] font-bold">حذف وإرجاع</button>
                        </div>
                    </div>`;
                });
                document.getElementById('totalDebts').innerText = irq(tdSum);
            });
        }

        // --- وظائف التعديل ---
        function openEditModal(id) {
            const p = allLiveProducts[id];
            document.getElementById('edit_id').value = id;
            document.getElementById('edit_cost').value = p.cost;
            document.getElementById('edit_sell').value = p.sell;
            const area = document.getElementById('edit_flavors_area');
            area.innerHTML = p.flavors.map((f, i) => `
                <div class="flex gap-2 mb-1">
                    <input type="text" value="${f.name}" class="text-xs p-1" onchange="allLiveProducts['${id}'].flavors[${i}].name=this.value">
                    <input type="number" value="${f.qty}" class="text-xs p-1 w-16" onchange="allLiveProducts['${id}'].flavors[${i}].qty=Number(this.value)">
                </div>
            `).join('');
            document.getElementById('editModal').style.display = 'flex';
        }

        async function saveEdit() {
            const id = document.getElementById('edit_id').value;
            const cost = Number(document.getElementById('edit_cost').value);
            const sell = Number(document.getElementById('edit_sell').value);
            await db.ref('products/' + id).update({ cost, sell, flavors: allLiveProducts[id].flavors });
            closeModals();
        }

        // --- وظائف البيع والارجاع ---
        function openSellMenu(id) {
            const p = allLiveProducts[id]; currentSale.id = id;
            const container = document.getElementById('sellOptions');
            container.innerHTML = `<h3 class="text-center font-bold mb-3">اختر النكهة</h3>`;
            p.flavors.forEach((f, idx) => {
                container.innerHTML += `<button onclick="stepTwo(${idx})" class="btn-choice bg-indigo-50 border-indigo-100">${f.name} (${f.qty})</button>`;
            });
            document.getElementById('sellModal').style.display = 'flex';
        }

        function stepTwo(fIdx) {
            currentSale.fIdx = fIdx;
            document.getElementById('sellOptions').innerHTML = `
                <button onclick="finalSale('CASH')" class="btn-choice bg-green-500 text-white">💰 كاش</button>
                <input type="text" id="debtor_name" placeholder="اسم المديون..." class="mb-2 text-center">
                <button onclick="finalSale('DEBT', document.getElementById('debtor_name').value)" class="btn-choice bg-slate-800 text-white">👤 تسجيل دين</button>`;
        }

        async function finalSale(type, name) {
            const p = allLiveProducts[currentSale.id]; const flavor = p.flavors[currentSale.fIdx];
            flavor.qty -= 1;
            const updatedFlavors = p.flavors.filter(f => f.qty > 0);
            await db.ref('products/' + currentSale.id).update({ flavors: updatedFlavors });

            if (type === 'CASH') {
                const s = (await db.ref('stats').once('value')).val() || { cash: 0, profit: 0 };
                await db.ref('stats').set({ cash: s.cash + p.sell, profit: s.profit + (p.sell - p.cost) });
            } else {
                await db.ref('debts').push({ name: name, amount: p.sell, details: `${p.name} (${flavor.name})`, pId: currentSale.id, fName: flavor.name });
            }
            closeModals();
        }

        async function returnItemAndDeleteDebt(debtId) {
            const d = allLiveDebts[debtId];
            if (!confirm(`هل تريد حذف دين ${d.name} وإرجاع النكهة؟`)) return;
            const snap = await db.ref('products/' + d.pId).once('value');
            if (snap.exists()) {
                let p = snap.val(); p.flavors = p.flavors || [];
                let found = false;
                p.flavors.forEach(f => { if (f.name === d.fName) { f.qty += 1; found = true; } });
                if (!found) p.flavors.push({ name: d.fName, qty: 1 });
                await db.ref('products/' + d.pId).update({ flavors: p.flavors });
            }
            await db.ref('debts/' + debtId).remove();
        }

        function saveProduct() {
            const n = document.getElementById('p_name').value, c = Number(document.getElementById('p_cost').value), s = Number(document.getElementById('p_sell').value);
            if (n && s && currentFlavors.length > 0) {
                db.ref('products').push({ name: n, cost: c, sell: s, flavors: currentFlavors });
                currentFlavors = []; renderTemp();
                document.getElementById('p_name').value = '';
            } else alert("اكمل البيانات!");
        }

        function closeModals() { document.getElementById('sellModal').style.display='none'; document.getElementById('editModal').style.display='none'; }
    </script>
</body>
</html>
