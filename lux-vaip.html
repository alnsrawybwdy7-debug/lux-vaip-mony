<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>نظام lux_vaip - تطوير أبو نجم</title>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

            body {
                font-family: 'Tajawal', sans-serif;
                background-color: #f1f5f9;
            }

            .stat-card {
                transition: all 0.3s ease;
            }

            .stat-card:hover {
                transform: scale(1.02);
            }
        </style>
    </head>

    <body class="pb-24">

        <header class="bg-slate-900 text-white p-6 shadow-2xl text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 p-2 opacity-20 text-xs italic">Cloud V 3.0</div>
            <h1 class="text-2xl font-bold tracking-wide">تصفيه وجرد حساب lux_vaip ☁️</h1>
            <p class="text-indigo-400 text-sm mt-1 font-bold">مزامنة فورية بين حسوني & مصطفى</p>

            <div class="flex justify-center gap-3 mt-5">
                <button onclick="switchStore('hussouni')" id="btn-h"
                    class="px-5 py-2 rounded-full bg-indigo-600 text-white font-bold shadow-lg transition-all">حسوني
                    الوائلي</button>
                <button onclick="switchStore('mustafa')" id="btn-m"
                    class="px-5 py-2 rounded-full bg-white text-gray-700 font-bold shadow-lg transition-all">مصطفى
                    ديوانية</button>
            </div>
        </header>

        <main class="container mx-auto px-4 mt-8">
            <div class="grid grid-cols-2 lg:grid-cols-5 gap-3 mb-8">
                <div class="stat-card bg-white p-4 rounded-2xl shadow-sm border-b-4 border-blue-500 text-center">
                    <span class="text-[10px] text-gray-400 font-bold block mb-1">إجمالي البضاعة</span>
                    <input type="number" id="main-total" oninput="updateFinance()"
                        class="w-full font-bold text-center text-lg outline-none bg-transparent" placeholder="0">
                </div>
                <div class="stat-card bg-white p-4 rounded-2xl shadow-sm border-b-4 border-green-500 text-center">
                    <span class="text-[10px] text-gray-400 font-bold block mb-1">المبيعات (كاش)</span>
                    <input type="number" id="main-sold" oninput="updateFinance()"
                        class="w-full font-bold text-center text-lg outline-none bg-transparent" placeholder="0">
                </div>
                <div class="stat-card bg-white p-4 rounded-2xl shadow-sm border-b-4 border-red-500 text-center">
                    <span class="text-[10px] text-gray-400 font-bold block mb-1">إجمالي الديون</span>
                    <p id="total-debt-display" class="font-bold text-lg text-red-600">0</p>
                </div>
                <div
                    class="stat-card bg-indigo-900 p-4 rounded-2xl shadow-lg border-b-4 border-yellow-400 text-center text-white">
                    <span class="text-[10px] text-yellow-400 font-bold block mb-1">صافي الربح 💰</span>
                    <p id="profit-display" class="font-bold text-lg text-white">0</p>
                </div>
                <div
                    class="stat-card bg-slate-100 p-4 rounded-2xl shadow-sm border-b-4 border-slate-500 text-center lg:col-span-1 col-span-2">
                    <span class="text-[10px] text-slate-500 font-bold block mb-1">المبلغ المتبقي</span>
                    <p id="final-rem" class="font-bold text-lg text-slate-800">0</p>
                </div>
            </div>

            <section class="bg-white p-6 rounded-3xl shadow-sm mb-8">
                <h3 class="font-bold text-red-700 mb-4 flex items-center gap-2">📝 قائمة المديونين</h3>
                <div class="flex flex-col gap-3">
                    <input type="text" id="debtor-name" placeholder="اسم الشخص"
                        class="border-2 border-gray-100 p-3 rounded-xl text-sm outline-none focus:border-red-400 transition-all">
                    <div class="flex gap-2">
                        <input type="number" id="debtor-amount" placeholder="المبلغ المديون به"
                            class="flex-1 border-2 border-gray-100 p-3 rounded-xl text-sm outline-none focus:border-red-400 transition-all">
                        <button onclick="addDebtor()"
                            class="bg-red-600 text-white px-8 rounded-xl font-bold text-2xl hover:bg-red-700 shadow-md">+</button>
                    </div>
                </div>
                <div id="debtors-list" class="mt-6 space-y-2"></div>
            </section>

            <section class="bg-white p-6 rounded-3xl shadow-sm">
                <h3 class="font-bold text-indigo-700 mb-4 flex items-center gap-2 text-sm text-center italic underline">
                    📦 إضافة بضاعة وحساب الربح</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 bg-indigo-50 p-5 rounded-2xl mb-6">
                    <div class="md:col-span-2">
                        <input type="file" id="prod-img" accept="image/*" class="text-xs mb-2">
                        <input type="text" id="prod-name" placeholder="اسم القطعة (فيب، نكهة، إلخ)"
                            class="w-full border p-3 rounded-xl text-sm outline-none mb-2">
                    </div>
                    <input type="number" id="cost-price" placeholder="سعر التكلفة"
                        class="border p-3 rounded-xl text-sm outline-none">
                    <input type="number" id="sell-price" placeholder="سعر البيع"
                        class="border p-3 rounded-xl text-sm outline-none">
                    <button onclick="addProduct()"
                        class="md:col-span-2 bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-indigo-700">إضافة
                        للمخزن</button>
                </div>
                <div id="products-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </section>
        </main>

        <footer class="mt-10 text-center pb-10">
            <div class="bg-slate-800 inline-block px-6 py-2 rounded-full text-white shadow-lg">
                <span class="text-gray-400 text-xs font-bold underline">نظام سحابي بواسطة</span>
                <span class="text-yellow-400 font-bold ml-1 italic">أبو نجم 🌟</span>
            </div>
        </footer>

        <script>
            // إعدادات Firebase الخاصة بك يا أبو نجم
            const firebaseConfig = {
                apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc",
                authDomain: "lux-vaip.firebaseapp.com",
                projectId: "lux-vaip",
                storageBucket: "lux-vaip.firebasestorage.app",
                messagingSenderId: "958955103630",
                appId: "1:958955103630:web:1d3f7f94466021d57b70df",
                measurementId: "G-NET3PPRG11",
                databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/"
            };

            firebase.initializeApp(firebaseConfig);
            const rtdb = firebase.database();

            let currentStore = 'hussouni';
            let storeData = {
                hussouni: { total: 0, sold: 0, debtors: [], products: [] },
                mustafa: { total: 0, sold: 0, debtors: [], products: [] }
            };

            // الاستماع للتغييرات السحابية فورياً
            rtdb.ref('luxVaipData').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    storeData = snapshot.val();
                    render();
                }
            });

            function switchStore(s) {
                currentStore = s;
                document.getElementById('btn-h').className = s === 'hussouni' ? "px-5 py-2 rounded-full bg-indigo-600 text-white font-bold shadow-lg" : "px-5 py-2 rounded-full bg-white text-gray-700 font-bold shadow-lg";
                document.getElementById('btn-m').className = s === 'mustafa' ? "px-5 py-2 rounded-full bg-indigo-600 text-white font-bold shadow-lg" : "px-5 py-2 rounded-full bg-white text-gray-700 font-bold shadow-lg";
                render();
            }

            function updateFinance() {
                storeData[currentStore].total = document.getElementById('main-total').value;
                storeData[currentStore].sold = document.getElementById('main-sold').value;
                sync();
            }

            function addDebtor() {
                const name = document.getElementById('debtor-name').value;
                const amount = parseFloat(document.getElementById('debtor-amount').value) || 0;
                if (name && amount > 0) {
                    if (!storeData[currentStore].debtors) storeData[currentStore].debtors = [];
                    storeData[currentStore].debtors.push({ name, amount });
                    document.getElementById('debtor-name').value = '';
                    document.getElementById('debtor-amount').value = '';
                    sync();
                }
            }

            function addProduct() {
                const name = document.getElementById('prod-name').value;
                const cost = parseFloat(document.getElementById('cost-price').value) || 0;
                const sell = parseFloat(document.getElementById('sell-price').value) || 0;
                const file = document.getElementById('prod-img').files[0];

                if (name && file) {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        if (!storeData[currentStore].products) storeData[currentStore].products = [];
                        storeData[currentStore].products.push({ name, cost, sell, img: e.target.result });
                        document.getElementById('prod-name').value = '';
                        document.getElementById('cost-price').value = '';
                        document.getElementById('sell-price').value = '';
                        document.getElementById('prod-img').value = '';
                        sync();
                    };
                    reader.readAsDataURL(file);
                } else { alert("يرجى ملء الاسم والصورة"); }
            }

            function deleteItem(type, index) {
                if (confirm("هل تريد الحذف؟")) {
                    storeData[currentStore][type].splice(index, 1);
                    sync();
                }
            }

            function sync() {
                rtdb.ref('luxVaipData').set(storeData);
            }

            function render() {
                const s = storeData[currentStore];
                document.getElementById('main-total').value = s.total || '';
                document.getElementById('main-sold').value = s.sold || '';

                let totalD = 0;
                const dList = document.getElementById('debtors-list');
                dList.innerHTML = '';
                (s.debtors || []).forEach((d, i) => {
                    totalD += d.amount;
                    dList.innerHTML += `
                    <div class="flex justify-between items-center bg-red-50 p-3 rounded-xl border border-red-100 shadow-sm">
                        <span class="font-bold text-gray-700">${d.name}: <span class="text-red-600">${d.amount.toLocaleString()}</span></span>
                        <button onclick="deleteItem('debtors', ${i})" class="bg-white text-red-500 p-1 px-3 rounded-lg text-xs font-bold shadow-sm">حذف</button>
                    </div>`;
                });
                document.getElementById('total-debt-display').innerText = totalD.toLocaleString();

                let totalProfit = 0;
                (s.products || []).forEach(p => totalProfit += (p.sell - p.cost));
                document.getElementById('profit-display').innerText = totalProfit.toLocaleString() + " د.ع";

                const rem = (parseFloat(s.total) || 0) - ((parseFloat(s.sold) || 0) + totalD);
                document.getElementById('final-rem').innerText = rem.toLocaleString();

                const pGrid = document.getElementById('products-grid');
                pGrid.innerHTML = '';
                (s.products || []).forEach((p, i) => {
                    pGrid.innerHTML += `
                    <div class="bg-white rounded-2xl overflow-hidden shadow-md border border-gray-100 relative group">
                        <img src="${p.img}" class="w-full h-32 object-cover">
                        <div class="p-3">
                            <h4 class="font-bold text-xs truncate text-indigo-900">${p.name}</h4>
                            <div class="flex justify-between mt-1 text-[9px] font-bold">
                                <span class="text-gray-400 font-bold underline">التكلفة: ${p.cost}</span>
                                <span class="text-green-600">الربح: ${p.sell - p.cost}</span>
                            </div>
                            <button onclick="deleteItem('products', ${i})" class="w-full mt-3 py-1 bg-red-50 text-red-500 text-[10px] rounded-lg font-bold">حذف</button>
                        </div>
                    </div>`;
                });
            }
        </script>
    </body>

</html>
