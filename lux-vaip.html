<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة LUX_VAIP | Abdullah-Abd-Alsalam</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;800&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; }
        .admin-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; }
        .input-style { background: #0f172a; border: 1px solid #1e293b; border-radius: 0.75rem; padding: 10px; width: 100%; outline: none; transition: 0.3s; }
        .input-style:focus { border-color: #6366f1; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center">
        <div class="admin-card p-8 w-full max-w-md text-center">
            <h2 class="text-2xl font-black mb-6 italic text-indigo-400">دخول المدير</h2>
            <input type="password" id="adminPass" class="input-style mb-4 text-center" placeholder="أدخل كلمة المرور">
            <button onclick="checkLogin()" class="w-full bg-indigo-600 p-3 rounded-xl font-bold hover:bg-indigo-500">دخول</button>
        </div>
    </div>

    <div id="adminContent" style="display:none;">
        <header class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-3xl font-black italic">لوحة التحكم <span class="text-indigo-500">LUX</span></h1>
                <p class="text-xs text-slate-500 mt-1 italic">المطور: Abdullah-Abd-Alsalam</p>
            </div>
            <button onclick="location.reload()" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-lg text-xs font-bold">تسجيل خروج</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="admin-card p-6 border-l-4 border-indigo-500">
                <p class="text-slate-400 text-sm italic">إجمالي قطع المخزن</p>
                <h3 id="statTotalQty" class="text-3xl font-black">0</h3>
            </div>
            <div class="admin-card p-6 border-l-4 border-green-500">
                <p class="text-slate-400 text-sm italic">صافي الربح المتوقع</p>
                <h3 id="statTotalProfit" class="text-3xl font-black text-green-400">0 <small class="text-xs">د.ع</small></h3>
            </div>
            <div class="admin-card p-6 border-l-4 border-yellow-500">
                <p class="text-slate-400 text-sm italic">قيمة البضاعة (بيع)</p>
                <h3 id="statTotalValue" class="text-3xl font-black text-yellow-400">0 <small class="text-xs">د.ع</small></h3>
            </div>
        </div>

        <div class="admin-card p-6 mb-10">
            <h2 class="text-xl font-bold mb-6 italic border-r-4 border-indigo-500 pr-3">إضافة بضاعة جديدة</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <input type="text" id="pName" class="input-style" placeholder="اسم المنتج">
                <input type="text" id="pImg" class="input-style" placeholder="رابط الصورة">
                <input type="number" id="pCost" class="input-style" placeholder="سعر الكلفة">
                <input type="number" id="pSell" class="input-style" placeholder="سعر البيع">
                <input type="number" id="pQty" class="input-style" placeholder="الكمية">
                <select id="pOwner" class="input-style">
                    <option value="mustafa">مخزن مصطفى</option>
                    <option value="hussouni">مخزن حسوني</option>
                </select>
                <button onclick="addProduct()" class="lg:col-span-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition-all">إضافة للمتجر +</button>
            </div>
        </div>

        <div class="admin-card overflow-hidden">
            <table class="w-full text-right">
                <thead class="bg-slate-900 text-slate-400 text-xs">
                    <tr>
                        <th class="p-4">المنتج</th>
                        <th class="p-4">الكمية</th>
                        <th class="p-4">البيع</th>
                        <th class="p-4">الربح/قطعة</th>
                        <th class="p-4">المخزن</th>
                        <th class="p-4">إجراءات</th>
                    </tr>
                </thead>
                <tbody id="adminTable">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc",
            authDomain: "lux-vaip.firebaseapp.com",
            projectId: "lux-vaip",
            storageBucket: "lux-vaip.firebasestorage.app",
            messagingSenderId: "958955103630",
            appId: "1:958955103630:web:1d3f7f94466021d57b70df",
            measurementId: "G-NET3PPRG11",
            databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // دخول المدير
        function checkLogin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "1234") { // غير كلمة المرور هنا
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadData();
            } else { alert("كلمة المرور غلط!"); }
        }

        function loadData() {
            db.ref('luxVaipData').on('value', (snap) => {
                const data = snap.val();
                const table = document.getElementById('adminTable');
                table.innerHTML = '';
                let tQty = 0, tProfit = 0, tValue = 0;

                if(data) {
                    ['mustafa', 'hussouni'].forEach(owner => {
                        if(data[owner] && data[owner].products) {
                            data[owner].products.forEach((p, index) => {
                                const profit = p.sell - (p.cost || 0);
                                tQty += Number(p.qty);
                                tValue += (p.sell * p.qty);
                                tProfit += (profit * p.qty);

                                table.innerHTML += `
                                    <tr class="border-t border-slate-800 hover:bg-slate-800/30">
                                        <td class="p-4 font-bold text-sm">${p.name}</td>
                                        <td class="p-4 text-indigo-400 font-bold underline cursor-pointer" onclick="updateQty('${owner}', ${index}, ${p.qty})">${p.qty}</td>
                                        <td class="p-4 text-xs">${Number(p.sell).toLocaleString()}</td>
                                        <td class="p-4 text-green-400 text-xs font-bold">+${Number(profit).toLocaleString()}</td>
                                        <td class="p-4 text-[10px] italic text-slate-500">${owner}</td>
                                        <td class="p-4">
                                            <button onclick="deleteProduct('${owner}', ${index})" class="text-red-500 hover:text-red-400 text-xs"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>`;
                            });
                        }
                    });
                }
                document.getElementById('statTotalQty').innerText = tQty;
                document.getElementById('statTotalValue').innerText = tValue.toLocaleString();
                document.getElementById('statTotalProfit').innerText = tProfit.toLocaleString();
            });
        }

        function addProduct() {
            const owner = document.getElementById('pOwner').value;
            const newP = {
                name: document.getElementById('pName').value,
                img: document.getElementById('pImg').value,
                cost: Number(document.getElementById('pCost').value),
                sell: Number(document.getElementById('pSell').value),
                qty: Number(document.getElementById('pQty').value)
            };
            
            db.ref(`luxVaipData/${owner}/products`).once('value', (snap) => {
                const list = snap.val() || [];
                list.push(newP);
                db.ref(`luxVaipData/${owner}/products`).set(list).then(() => {
                    alert("تمت الإضافة بنجاح!");
                });
            });
        }

        function updateQty(owner, index, current) {
            const newQty = prompt("تعديل الكمية الجديدة:", current);
            if(newQty !== null) {
                db.ref(`luxVaipData/${owner}/products/${index}/qty`).set(Number(newQty));
            }
        }

        function deleteProduct(owner, index) {
            if(confirm("تريد تحذف هذا المنتج نهائياً؟")) {
                db.ref(`luxVaipData/${owner}/products`).once('value', (snap) => {
                    let list = snap.val();
                    list.splice(index, 1);
                    db.ref(`luxVaipData/${owner}/products`).set(list);
                });
            }
        }
    </script>
</body>
</html>
