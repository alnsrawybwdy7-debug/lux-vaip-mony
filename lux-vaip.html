<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة LUX_VAIP | تحكم كامل</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; }
        .stat-card { background: white; border-radius: 1rem; padding: 15px; border-right: 5px solid #6366f1; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input, select, textarea { border: 1px solid #cbd5e1; border-radius: 0.75rem; padding: 10px; font-size: 14px; width: 100%; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { background: white; padding: 12px; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .edit-badge { background: #e0e7ff; color: #4338ca; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .edit-badge:hover { background: #c7d2fe; }
        .btn-sell { background: #22c55e; color: white; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .btn-sell:disabled { background: #cbd5e1; cursor: not-allowed; opacity: 0.5; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginSection" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-6 text-center">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm">
            <h2 class="text-2xl font-black mb-4 italic text-indigo-600">LUX ADMIN</h2>
            <input type="password" id="passInput" class="text-center mb-4" placeholder="رمز الدخول">
            <button onclick="login()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-black">دخول</button>
        </div>
    </div>

    <div id="mainSection" style="display:none;">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="stat-card"> <p class="text-gray-400 text-[10px] font-bold">بضاعة المخزن</p> <h2 id="totalQty" class="text-xl font-black">0</h2> </div>
            <div class="stat-card"> <p class="text-gray-400 text-[10px] font-bold">أرباح المبيعات (بجيبك)</p> <h2 id="soldProfit" class="text-xl font-black text-green-600">0</h2> </div>
            <div class="stat-card"> <p class="text-gray-400 text-[10px] font-bold">قيمة المخزن</p> <h2 id="totalValue" class="text-xl font-black">0</h2> </div>
            <div class="stat-card"> <p class="text-gray-400 text-[10px] font-bold">أرباح المخزن</p> <h2 id="totalProfit" class="text-xl font-black text-amber-600">0</h2> </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 border">
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-3">
                <input type="text" id="p_name" placeholder="اسم المنتج">
                <label class="bg-slate-100 p-2.5 rounded-xl text-center text-xs cursor-pointer">📸 صورة <input type="file" id="p_file" accept="image/*" class="hidden" onchange="previewImage(this)"></label>
                <input type="number" id="p_cost" placeholder="سعر الكلفة">
                <input type="number" id="p_sell" placeholder="سعر البيع">
                <input type="number" id="p_qty" placeholder="الكمية">
                <select id="p_owner"><option value="mustafa">مصطفى</option><option value="hussouni">حسوني</option></select>
                <textarea id="p_desc" class="md:col-span-3 lg:col-span-5" placeholder="وصف المنتج..."></textarea>
                <button onclick="saveProduct()" class="bg-indigo-600 text-white font-black rounded-xl">إضافة</button>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table>
                <thead>
                    <tr class="text-xs text-slate-400 uppercase">
                        <th>المنتج</th> <th>المخزن</th> <th>الكمية</th> <th>السعر (بيع)</th> <th>الربح/ق</th> <th>إجراء</th> <th>حذف</th>
                    </tr>
                </thead>
                <tbody id="pTableBody"></tbody>
            </table>
        </div>
        
        <div class="mt-10 text-center">
            <button onclick="resetSales()" class="text-red-500 text-xs underline font-bold">تصفير أرباح المبيعات اليوم</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc",
            authDomain: "lux-vaip.firebaseapp.com",
            projectId: "lux-vaip",
            storageBucket: "lux-vaip.firebasestorage.app",
            messagingSenderId: "958955103630",
            appId: "1:958955103630:web:1d3f7f94466021d57b70df",
            measurementId: "G-NET3PPRG11",
            databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let base64Img = "";

        function login() { if(document.getElementById('passInput').value === "1234") { document.getElementById('loginSection').style.display='none'; document.getElementById('mainSection').style.display='block'; fetchData(); } }

        function previewImage(input) {
            const reader = new FileReader();
            reader.onload = (e) => base64Img = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }

        function fetchData() {
            db.ref('luxVaipData').on('value', (snap) => {
                const data = snap.val();
                const tbody = document.getElementById('pTableBody');
                tbody.innerHTML = '';
                let tQty = 0, tProfit = 0, tValue = 0;
                let sProfit = data?.salesProfit || 0;

                if(data) {
                    ['mustafa', 'hussouni'].forEach(owner => {
                        if(data[owner]?.products) {
                            data[owner].products.forEach((p, idx) => {
                                const profitPerPiece = p.sell - (p.cost || 0);
                                tQty += Number(p.qty); tValue += (p.sell * p.qty); tProfit += (profitPerPiece * p.qty);

                                tbody.innerHTML += `
                                    <tr>
                                        <td>
                                            <div class="flex items-center gap-2">
                                                <img src="${p.img}" class="w-8 h-8 rounded object-cover">
                                                <div class="font-bold text-sm">${p.name}</div>
                                            </div>
                                        </td>
                                        <td class="text-[10px] font-bold text-slate-400 uppercase">${owner}</td>
                                        <td>
                                            <div class="flex flex-col items-center">
                                                <span class="font-black ${p.qty <= 0 ? 'text-red-500':'text-indigo-600'}">${p.qty}</span>
                                                <span onclick="editField('${owner}', ${idx}, 'qty', ${p.qty})" class="edit-badge">تعديل</span>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="flex flex-col items-center text-sm">
                                                <span class="font-bold">${Number(p.sell).toLocaleString()}</span>
                                                <span onclick="editField('${owner}', ${idx}, 'sell', ${p.sell})" class="edit-badge">تعديل</span>
                                            </div>
                                        </td>
                                        <td class="text-green-600 font-bold text-xs">+${profitPerPiece.toLocaleString()}</td>
                                        <td><button onclick="sellPiece('${owner}', ${idx}, ${p.qty}, ${profitPerPiece})" class="btn-sell" ${p.qty <= 0 ? 'disabled':''}>تم البيع</button></td>
                                        <td><button onclick="delItem('${owner}', ${idx})" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash text-xs"></i></button></td>
                                    </tr>`;
                            });
                        }
                    });
                }
                document.getElementById('totalQty').innerText = tQty;
                document.getElementById('totalValue').innerText = tValue.toLocaleString();
                document.getElementById('totalProfit').innerText = tProfit.toLocaleString();
                document.getElementById('soldProfit').innerText = sProfit.toLocaleString();
            });
        }

        // دالة التعديل المباشر (للكتلة، السعر، أو أي حقل)
        function editField(owner, idx, field, currentVal) {
            const label = field === 'qty' ? 'الكمية الجديدة' : 'سعر البيع الجديد';
            const newVal = prompt(`تعديل ${label}:`, currentVal);
            if(newVal !== null && newVal !== "") {
                db.ref(`luxVaipData/${owner}/products/${idx}/${field}`).set(Number(newVal));
            }
        }

        function sellPiece(owner, idx, currentQty, profit) {
            if(currentQty > 0) {
                db.ref(`luxVaipData/${owner}/products/${idx}/qty`).set(currentQty - 1);
                db.ref(`luxVaipData/salesProfit`).once('value', (s) => {
                    db.ref(`luxVaipData/salesProfit`).set((s.val() || 0) + profit);
                });
            }
        }

        function saveProduct() {
            const owner = document.getElementById('p_owner').value;
            const newItem = {
                name: document.getElementById('p_name').value,
                desc: document.getElementById('p_desc').value,
                img: base64Img,
                cost: Number(document.getElementById('p_cost').value),
                sell: Number(document.getElementById('p_sell').value),
                qty: Number(document.getElementById('p_qty').value)
            };
            db.ref(`luxVaipData/${owner}/products`).once('value', (snap) => {
                let list = snap.val() || [];
                list.push(newItem);
                db.ref(`luxVaipData/${owner}/products`).set(list).then(() => location.reload());
            });
        }

        function resetSales() { if(confirm("تصفير أرباح اليوم؟")) db.ref(`luxVaipData/salesProfit`).set(0); }
        function delItem(owner, idx) { if(confirm("حذف؟")) { db.ref(`luxVaipData/${owner}/products`).once('value', (snap) => { let list = snap.val(); list.splice(idx, 1); db.ref(`luxVaipData/${owner}/products`).set(list); }); } }
    </script>
</body>
</html>
