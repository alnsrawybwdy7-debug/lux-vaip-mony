<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>نظام lux_vaip - تطوير أبو نجم</title>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

            body {
                font-family: 'Tajawal', sans-serif;
                background-color: #f1f5f9;
            }

            .out-of-stock {
                filter: grayscale(1);
                opacity: 0.7;
            }

            .badge-red {
                background-color: #ef4444;
                color: white;
                padding: 2px 8px;
                border-radius: 10px;
                font-size: 10px;
            }
        </style>
    </head>

    <body class="pb-24">

        <header class="bg-slate-900 text-white p-6 shadow-2xl text-center">
            <h1 class="text-2xl font-bold">إدارة lux_vaip ☁️</h1>
            <div class="flex justify-center gap-3 mt-5">
                <button onclick="switchStore('hussouni')" id="btn-h"
                    class="px-5 py-2 rounded-full bg-indigo-600 text-white font-bold shadow-lg">حسوني</button>
                <button onclick="switchStore('mustafa')" id="btn-m"
                    class="px-5 py-2 rounded-full bg-white text-gray-700 font-bold shadow-lg">مصطفى</button>
            </div>
        </header>

        <main class="container mx-auto px-4 mt-8">
            <section class="bg-white p-6 rounded-3xl shadow-sm mb-8">
                <h3 class="font-bold text-indigo-700 mb-4 text-center italic underline">📦 إضافة بضاعة جديدة</h3>
                <div class="space-y-3 bg-indigo-50 p-5 rounded-2xl mb-6">
                    <input type="file" id="prod-img" accept="image/*" class="text-xs mb-2">
                    <input type="text" id="prod-name" placeholder="اسم المنتج"
                        class="w-full border p-3 rounded-xl text-sm outline-none">
                    <textarea id="prod-desc" placeholder="وصف المنتج"
                        class="w-full border p-3 rounded-xl text-sm outline-none h-16"></textarea>
                    <div class="grid grid-cols-3 gap-2">
                        <input type="number" id="prod-qty" placeholder="الكمية"
                            class="border p-3 rounded-xl text-sm outline-none">
                        <input type="number" id="cost-price" placeholder="التكلفة"
                            class="border p-3 rounded-xl text-sm outline-none">
                        <input type="number" id="sell-price" placeholder="البيع"
                            class="border p-3 rounded-xl text-sm outline-none">
                    </div>
                    <button onclick="addProduct()"
                        class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">إضافة للمخزن</button>
                </div>

                <div id="products-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </section>
        </main>

        <script>
            const firebaseConfig = {
                apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc",
                authDomain: "lux-vaip.firebaseapp.com",
                projectId: "lux-vaip",
                storageBucket: "lux-vaip.firebasestorage.app",
                messagingSenderId: "958955103630",
                appId: "1:958955103630:web:1d3f7f94466021d57b70df",
                measurementId: "G-NET3PPRG11",
                databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/"
            };

            firebase.initializeApp(firebaseConfig);
            const rtdb = firebase.database();
            let currentStore = 'hussouni';
            let storeData = { hussouni: { total: 0, sold: 0, debtors: [], products: [] }, mustafa: { total: 0, sold: 0, debtors: [], products: [] } };

            rtdb.ref('luxVaipData').on('value', (snapshot) => {
                if (snapshot.exists()) { storeData = snapshot.val(); render(); }
            });

            function switchStore(s) { currentStore = s; render(); }

            function addProduct() {
                const name = document.getElementById('prod-name').value;
                const desc = document.getElementById('prod-desc').value;
                const qty = parseInt(document.getElementById('prod-qty').value) || 0;
                const cost = parseFloat(document.getElementById('cost-price').value) || 0;
                const sell = parseFloat(document.getElementById('sell-price').value) || 0;
                const file = document.getElementById('prod-img').files[0];

                if (name && file) {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        if (!storeData[currentStore].products) storeData[currentStore].products = [];
                        storeData[currentStore].products.push({ name, desc, qty, cost, sell, img: e.target.result });
                        sync();
                    };
                    reader.readAsDataURL(file);
                }
            }

            // دالة لتقليل الكمية عند البيع
            function reduceQty(index) {
                if (storeData[currentStore].products[index].qty > 0) {
                    storeData[currentStore].products[index].qty--;
                    sync();
                }
            }

            function deleteItem(type, index) {
                if (confirm("حذف؟")) { storeData[currentStore][type].splice(index, 1); sync(); }
            }

            function sync() { rtdb.ref('luxVaipData').set(storeData); }

            function render() {
                const s = storeData[currentStore];
                const pGrid = document.getElementById('products-grid');
                pGrid.innerHTML = '';
                (s.products || []).forEach((p, i) => {
                    const isOut = p.qty <= 0;
                    pGrid.innerHTML += `
                <div class="bg-white rounded-2xl overflow-hidden shadow-md border p-2 ${isOut ? 'out-of-stock' : ''} relative">
                    ${isOut ? '<span class="absolute top-2 right-2 badge-red z-10">نفدت الكمية ❌</span>' : ''}
                    <img src="${p.img}" class="w-full h-24 object-cover rounded-lg">
                    <h4 class="font-bold text-[10px] mt-2">${p.name}</h4>
                    <p class="text-[9px] text-blue-600 font-bold">المتوفر: ${p.qty} قطعة</p>
                    <div class="flex gap-1 mt-2">
                        <button onclick="reduceQty(${i})" class="flex-1 bg-green-100 text-green-700 text-[9px] py-1 rounded font-bold">- بيع قطعة</button>
                        <button onclick="deleteItem('products', ${i})" class="bg-red-50 text-red-500 p-1 rounded"><i class="text-[9px]">حذف</i></button>
                    </div>
                </div>`;
                });
            }
        </script>
    </body>

</html>
