<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX_VAIP | Pro Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    </style>
</head>
<body class="p-4">

    <!-- شاشة الدخول -->
    <div id="authOverlay" class="fixed inset-0 bg-slate-900 z-[999] flex flex-col items-center justify-center">
        <div class="bg-white p-8 rounded-3xl shadow-2xl text-center">
            <h2 class="mb-4 font-black">تسجيل الدخول</h2>
            <input type="password" id="adminPass" placeholder="الرمز" class="border p-2 rounded-xl text-center mb-4 block w-full">
            <button onclick="checkAuth()" class="bg-indigo-600 text-white px-8 py-2 rounded-xl w-full font-bold">دخول</button>
        </div>
    </div>

    <!-- مودال البيع -->
    <div id="sellModal" class="modal">
        <div class="bg-white p-6 rounded-[2rem] w-full max-w-md">
            <div id="sellOptions" class="space-y-2"></div>
            <button onclick="closeModal()" class="w-full mt-4 text-slate-400 font-bold">إغلاق</button>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <div class="flex justify-between items-center mb-6">
            <button onclick="logout()" class="text-red-500 font-bold text-sm">خروج</button>
            <h1 class="text-xl font-black text-indigo-900 italic">LUX_VAIP SYSTEM</h1>
        </div>

        <!-- الإحصائيات -->
        <div class="grid grid-cols-2 gap-3 mb-6 text-center">
            <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-green-500">
                <p class="text-[10px] font-bold text-slate-400">كاش</p>
                <h2 id="totalCash" class="text-lg font-black text-green-600">0</h2>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-rose-500">
                <p class="text-[10px] font-bold text-slate-400">ديون</p>
                <h2 id="totalDebts" class="text-lg font-black text-rose-600">0</h2>
            </div>
        </div>

        <!-- الديون -->
        <div class="bg-white p-5 rounded-2xl shadow-sm mb-6 border border-slate-100">
            <h3 class="font-black mb-4 text-slate-700">قائمة المديونين</h3>
            <div id="debtTableBody" class="space-y-3"></div>
        </div>

        <!-- المخزن -->
        <div class="bg-white p-4 rounded-2xl shadow-sm overflow-x-auto border border-slate-100">
            <table class="w-full text-right">
                <thead class="text-[10px] text-slate-400 border-b">
                    <tr><th class="pb-2">الجهاز</th><th>النكهات</th><th>السعر</th><th>إجراء</th></tr>
                </thead>
                <tbody id="pTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const PASS = "1221";
        let db, allProds = {}, allDebts = {}, currentSale = {};

        // الدخول والخروج
        function checkAuth() { if(document.getElementById('adminPass').value === PASS) { localStorage.setItem('admin_v', '1'); location.reload(); } }
        function logout() { localStorage.removeItem('admin_v'); location.reload(); }
        window.onload = () => { if(localStorage.getItem('admin_v')) { document.getElementById('authOverlay').remove(); document.getElementById('mainContent').classList.remove('hidden'); init(); } };

        function init() {
            firebase.initializeApp({ apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc", databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/" });
            db = firebase.database();
            loadData();
        }

        function loadData() {
            db.ref().on('value', snap => {
                const data = snap.val() || {};
                allProds = data.products || {};
                allDebts = data.debts || {};
                
                // تحديث واجهة المخزن
                const pt = document.getElementById('pTableBody'); pt.innerHTML = '';
                Object.keys(allProds).forEach(id => {
                    const p = allProds[id];
                    let fHtml = p.flavors ? p.flavors.map(f => `<span class="bg-slate-100 text-[10px] px-2 py-0.5 rounded m-0.5 inline-block">${f.name} (${f.qty})</span>`).join('') : 'نفذت';
                    pt.innerHTML += `<tr class="border-b text-sm">
                        <td class="py-3 font-bold">${p.name}</td>
                        <td>${fHtml}</td>
                        <td class="text-green-600 font-black">${p.sell.toLocaleString()}</td>
                        <td><button onclick="openSell('${id}')" class="bg-indigo-600 text-white px-3 py-1 rounded-lg text-xs">بيع</button></td>
                    </tr>`;
                });

                // تحديث واجهة الديون
                const dt = document.getElementById('debtTableBody'); dt.innerHTML = '';
                let dSum = 0;
                Object.keys(allDebts).forEach(id => {
                    const d = allDebts[id]; dSum += d.amount;
                    dt.innerHTML += `<div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                        <div><p class="font-bold text-sm">${d.name}</p><p class="text-[9px] text-slate-400">${d.details}</p></div>
                        <div class="flex items-center gap-3">
                            <span class="text-rose-600 font-bold">${d.amount.toLocaleString()}</span>
                            <button onclick="returnItem('${id}')" class="bg-rose-100 text-rose-600 px-3 py-1 rounded-lg text-[10px] font-bold">إرجاع</button>
                        </div>
                    </div>`;
                });
                document.getElementById('totalDebts').innerText = dSum.toLocaleString() + " د.ع";
                document.getElementById('totalCash').innerText = (data.stats?.cash || 0).toLocaleString() + " د.ع";
            });
        }

        // --- عملية البيع وتخزين البيانات برمجياً ---
        function openSell(id) {
            currentSale.pId = id;
            const p = allProds[id];
            const div = document.getElementById('sellOptions');
            div.innerHTML = `<h3 class="text-center font-black mb-4">اختر النكهة</h3>`;
            p.flavors.forEach((f, idx) => {
                if(f.qty > 0) div.innerHTML += `<button onclick="chooseFlavor(${idx})" class="w-full p-3 border rounded-xl hover:bg-indigo-50 font-bold">${f.name}</button>`;
            });
            document.getElementById('sellModal').style.display = 'flex';
        }

        function chooseFlavor(fIdx) {
            currentSale.fIdx = fIdx;
            const div = document.getElementById('sellOptions');
            div.innerHTML = `
                <button onclick="completeSale('CASH')" class="w-full p-4 bg-green-500 text-white rounded-2xl font-bold mb-2">💰 دفع كاش</button>
                <div class="border-t my-4 pt-4 text-center">
                    <input type="text" id="dName" placeholder="اسم المديون" class="w-full p-3 border rounded-xl mb-2 text-center">
                    <button onclick="completeSale('DEBT')" class="w-full p-4 bg-slate-800 text-white rounded-2xl font-bold">👤 تسجيل دين</button>
                </div>`;
        }

        async function completeSale(type) {
            const p = allProds[currentSale.pId];
            const flavor = p.flavors[currentSale.fIdx];
            
            // 1. خصم من المخزن
            flavor.qty -= 1;
            await db.ref('products/' + currentSale.pId + '/flavors').set(p.flavors);

            if(type === 'CASH') {
                const s = (await db.ref('stats').once('value')).val() || {cash:0, profit:0};
                await db.ref('stats').set({ cash: s.cash + p.sell, profit: s.profit + (p.sell - p.cost) });
            } else {
                const name = document.getElementById('dName').value || "زبون مجهول";
                // تخزين الـ pId و fIdx برمجياً داخل سجل الدين
                await db.ref('debts').push({
                    name: name,
                    amount: p.sell,
                    details: `${p.name} - ${flavor.name}`,
                    pId: currentSale.pId, // معرف المنتج
                    fIdx: currentSale.fIdx // رقم النكهة في المصفوفة
                });
            }
            closeModal();
        }

        // --- عملية الإرجاع البرمجية (الحل المطلوب) ---
        async function returnItem(debtId) {
            const debt = allDebts[debtId];
            if(!confirm(`إرجاع القطعة للمخزن وحذف دين ${debt.name}؟`)) return;

            // استعادة البيانات برمجياً من السجل
            const pId = debt.pId;
            const fIdx = debt.fIdx;

            if(pId !== undefined && fIdx !== undefined) {
                const pSnap = await db.ref('products/' + pId).once('value');
                if(pSnap.exists()) {
                    let pData = pSnap.val();
                    if(pData.flavors && pData.flavors[fIdx]) {
                        pData.flavors[fIdx].qty += 1; // زيادة الكمية برمجياً
                        await db.ref('products/' + pId + '/flavors').set(pData.flavors);
                    }
                }
            }

            // حذف سجل الدين
            await db.ref('debts/' + debtId).remove();
            alert("تمت العملية برمجياً بنجاح ✅");
        }

        function closeModal() { document.getElementById('sellModal').style.display = 'none'; currentSale = {}; }
    </script>
</body>
</html>
