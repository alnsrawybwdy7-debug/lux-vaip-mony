<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>إدارة lux_vaip - تطوير أبو نجم</title>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

            body {
                font-family: 'Tajawal', sans-serif;
                background-color: #f1f5f9;
            }

            .out-of-stock {
                filter: grayscale(1);
                opacity: 0.6;
            }

            .badge-red {
                background: #ef4444;
                color: white;
                padding: 2px 8px;
                border-radius: 8px;
                font-size: 10px;
                position: absolute;
                top: 5px;
                right: 5px;
                z-index: 10;
            }
        </style>
    </head>

    <body class="pb-24">

        <header class="bg-slate-900 text-white p-6 shadow-2xl text-center">
            <h1 class="text-2xl font-bold italic">lux_vaip CLOUD V3 ☁️</h1>
            <p class="text-indigo-400 text-xs font-bold underline mt-1 italic">بإشراف وتطوير أبو نجم</p>
            <div class="flex justify-center gap-3 mt-6">
                <button onclick="switchStore('hussouni')" id="btn-h"
                    class="px-6 py-2 rounded-full bg-indigo-600 text-white font-bold shadow-lg transition-all">حسوني</button>
                <button onclick="switchStore('mustafa')" id="btn-m"
                    class="px-6 py-2 rounded-full bg-white text-gray-700 font-bold shadow-lg transition-all">مصطفى</button>
            </div>
        </header>

        <main class="container mx-auto px-4 mt-8">
            <div class="grid grid-cols-2 lg:grid-cols-5 gap-3 mb-8">
                <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-blue-500 text-center">
                    <span class="text-[10px] text-gray-400 font-bold block">إجمالي البضاعة</span>
                    <input type="number" id="main-total" oninput="updateFinance()"
                        class="w-full font-bold text-center text-lg outline-none bg-transparent" placeholder="0">
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-green-500 text-center">
                    <span class="text-[10px] text-gray-400 font-bold block">المبيعات (كاش)</span>
                    <input type="number" id="main-sold" oninput="updateFinance()"
                        class="w-full font-bold text-center text-lg outline-none bg-transparent" placeholder="0">
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-red-500 text-center">
                    <span class="text-[10px] text-gray-400 font-bold block">إجمالي الديون</span>
                    <p id="total-debt-display" class="font-bold text-lg text-red-600">0</p>
                </div>
                <div
                    class="bg-indigo-900 p-4 rounded-2xl shadow-lg border-b-4 border-yellow-400 text-center text-white">
                    <span class="text-[10px] text-yellow-400 font-bold block text-center">صافي الربح 💰</span>
                    <p id="profit-display" class="font-bold text-lg text-white">0</p>
                </div>
                <div
                    class="bg-slate-100 p-4 rounded-2xl shadow-sm border-b-4 border-slate-500 text-center lg:col-span-1 col-span-2">
                    <span class="text-[10px] text-slate-500 font-bold block">المبلغ المتبقي</span>
                    <p id="final-rem" class="font-bold text-lg text-slate-800">0</p>
                </div>
            </div>

            <section class="bg-white p-6 rounded-3xl shadow-sm mb-8 border border-red-50">
                <h3 class="font-bold text-red-700 mb-4 flex items-center gap-2 italic">📝 إضافة مديون</h3>
                <div class="flex flex-col gap-3">
                    <input type="text" id="debtor-name" placeholder="اسم الشخص"
                        class="border p-3 rounded-xl text-sm outline-none">
                    <div class="flex gap-2">
                        <input type="number" id="debtor-amount" placeholder="المبلغ"
                            class="flex-1 border p-3 rounded-xl text-sm outline-none"><button onclick="addDebtor()"
                            class="bg-red-600 text-white px-8 rounded-xl font-bold text-2xl shadow-md active:scale-95">+</button>
                    </div>
                </div>
                <div id="debtors-list" class="mt-6 space-y-2"></div>
            </section>

            <section class="bg-white p-6 rounded-3xl shadow-sm border border-indigo-50">
                <h3 class="font-bold text-indigo-700 mb-4 text-center italic underline">📦 إدارة المخزن (عداد وكميات)
                </h3>
                <div class="space-y-3 bg-indigo-50 p-5 rounded-2xl mb-6">
                    <input type="file" id="prod-img" accept="image/*" class="text-xs mb-2">
                    <input type="text" id="prod-name" placeholder="اسم المنتج"
                        class="w-full border p-3 rounded-xl text-sm outline-none">
                    <textarea id="prod-desc" placeholder="وصف المنتج (نكهة، لون، ضمان..)"
                        class="w-full border p-3 rounded-xl text-sm outline-none h-16"></textarea>
                    <div class="grid grid-cols-3 gap-2">
                        <input type="number" id="prod-qty" placeholder="الكمية"
                            class="border p-3 rounded-xl text-sm outline-none">
                        <input type="number" id="cost-price" placeholder="التكلفة"
                            class="border p-3 rounded-xl text-sm outline-none">
                        <input type="number" id="sell-price" placeholder="البيع"
                            class="border p-3 rounded-xl text-sm outline-none">
                    </div>
                    <button onclick="addProduct()"
                        class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-md active:scale-95">إضافة
                        للمخزن</button>
                </div>

                <div id="products-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </section>
        </main>

        <footer class="mt-10 text-center pb-10">
            <div class="bg-slate-800 inline-block px-8 py-2 rounded-full text-white shadow-lg">
                <span class="text-yellow-400 font-bold italic text-sm">أبو نجم - نسخة V3 الاحترافية</span>
            </div>
        </footer>

        <script>
            const firebaseConfig = {
                apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc",
                authDomain: "lux-vaip.firebaseapp.com",
                projectId: "lux-vaip",
                storageBucket: "lux-vaip.firebasestorage.app",
                messagingSenderId: "958955103630",
                appId: "1:958955103630:web:1d3f7f94466021d57b70df",
                measurementId: "G-NET3PPRG11",
                databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/"
            };

            firebase.initializeApp(firebaseConfig);
            const rtdb = firebase.database();

            let currentStore = 'hussouni';
            let storeData = {
                hussouni: { total: 0, sold: 0, debtors: [], products: [] },
                mustafa: { total: 0, sold: 0, debtors: [], products: [] }
            };

            rtdb.ref('luxVaipData').on('value', (snapshot) => {
                if (snapshot.exists()) { storeData = snapshot.val(); render(); }
            });

            function switchStore(s) {
                currentStore = s;
                document.getElementById('btn-h').className = s === 'hussouni' ? "px-6 py-2 rounded-full bg-indigo-600 text-white font-bold shadow-lg transition-all" : "px-6 py-2 rounded-full bg-white text-gray-700 font-bold shadow-lg transition-all";
                document.getElementById('btn-m').className = s === 'mustafa' ? "px-6 py-2 rounded-full bg-indigo-600 text-white font-bold shadow-lg transition-all" : "px-6 py-2 rounded-full bg-white text-gray-700 font-bold shadow-lg transition-all";
                render();
            }

            function updateFinance() {
                storeData[currentStore].total = document.getElementById('main-total').value;
                storeData[currentStore].sold = document.getElementById('main-sold').value;
                sync();
            }

            function addDebtor() {
                const name = document.getElementById('debtor-name').value;
                const amount = parseFloat(document.getElementById('debtor-amount').value) || 0;
                if (name && amount > 0) {
                    if (!storeData[currentStore].debtors) storeData[currentStore].debtors = [];
                    storeData[currentStore].debtors.push({ name, amount });
                    document.getElementById('debtor-name').value = '';
                    document.getElementById('debtor-amount').value = '';
                    sync();
                }
            }

            function addProduct() {
                const name = document.getElementById('prod-name').value;
                const desc = document.getElementById('prod-desc').value;
                const qty = parseInt(document.getElementById('prod-qty').value) || 0;
                const cost = parseFloat(document.getElementById('cost-price').value) || 0;
                const sell = parseFloat(document.getElementById('sell-price').value) || 0;
                const file = document.getElementById('prod-img').files[0];

                if (name && file) {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        if (!storeData[currentStore].products) storeData[currentStore].products = [];
                        storeData[currentStore].products.push({ name, desc, qty, cost, sell, img: e.target.result });
                        document.querySelectorAll('input, textarea').forEach(el => el.value = '');
                        sync();
                    };
                    reader.readAsDataURL(file);
                }
            }

            function reduceQty(index) {
                if (storeData[currentStore].products[index].qty > 0) {
                    storeData[currentStore].products[index].qty--;
                    sync();
                }
            }

            function deleteItem(type, index) {
                if (confirm("هل تريد الحذف نهائياً؟")) {
                    storeData[currentStore][type].splice(index, 1);
                    sync();
                }
            }

            function sync() { rtdb.ref('luxVaipData').set(storeData); }

            function render() {
                const s = storeData[currentStore];
                document.getElementById('main-total').value = s.total || '';
                document.getElementById('main-sold').value = s.sold || '';

                let totalD = 0;
                const dList = document.getElementById('debtors-list');
                dList.innerHTML = '';
                (s.debtors || []).forEach((d, i) => {
                    totalD += d.amount;
                    dList.innerHTML += `
                <div class="flex justify-between items-center bg-red-50 p-3 rounded-xl border border-red-100 shadow-sm">
                    <span class="font-bold text-gray-700 text-xs italic">${d.name}: <span class="text-red-600">${d.amount.toLocaleString()}</span></span>
                    <button onclick="deleteItem('debtors', ${i})" class="text-red-500 font-bold text-[10px] underline">حذف</button>
                </div>`;
                });
                document.getElementById('total-debt-display').innerText = totalD.toLocaleString();

                let totalProfit = 0;
                (s.products || []).forEach(p => { if (p.qty > 0) totalProfit += (p.sell - p.cost); });
                document.getElementById('profit-display').innerText = totalProfit.toLocaleString() + " د.ع";

                const rem = (parseFloat(s.total) || 0) - ((parseFloat(s.sold) || 0) + totalD);
                document.getElementById('final-rem').innerText = rem.toLocaleString();

                const pGrid = document.getElementById('products-grid');
                pGrid.innerHTML = '';
                (s.products || []).forEach((p, i) => {
                    const isOut = p.qty <= 0;
                    pGrid.innerHTML += `
                <div class="bg-white rounded-2xl overflow-hidden shadow-md border p-2 relative group transition-all ${isOut ? 'out-of-stock' : ''}">
                    ${isOut ? '<span class="badge-red">نفدت الكمية ❌</span>' : ''}
                    <img src="${p.img}" class="w-full h-24 object-cover rounded-lg">
                    <h4 class="font-bold text-[10px] mt-2 truncate">${p.name}</h4>
                    <p class="text-[9px] text-indigo-600 font-bold">المتوفر: ${p.qty} قطعة</p>
                    <div class="flex gap-1 mt-2"><button onclick="reduceQty(${i})" class="flex-1 bg-green-500 text-white text-[9px] py-1 rounded font-bold shadow-sm active:scale-95">- بيع قطعة</button>
                        <button onclick="deleteItem('products', ${i})" class="bg-red-50 text-red-500 p-1 rounded hover:bg-red-100 transition-all text-[9px]">حذف</button>
                    </div>
                </div>`;
                });
            }
        </script>
    </body>

</html>
