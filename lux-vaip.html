<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة LUX_VAIP | النسخة السحابية المتكاملة</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .stat-card { background: white; border-radius: 1rem; padding: 15px; border-right: 5px solid #6366f1; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .cash-card { border-right-color: #22c55e; background: #f0fdf4; }
        .debt-card { border-right-color: #e11d48; background: #fff1f2; }
        input, select, textarea { border: 1px solid #cbd5e1; border-radius: 0.75rem; padding: 10px; font-size: 14px; width: 100%; outline: none; }
        .flavor-tag { background: #e0e7ff; color: #4338ca; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; margin: 2px; display: inline-block; border: 1px solid #c7d2fe; }
        #loginOverlay { position: fixed; inset: 0; background: #0f172a; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginOverlay">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-black mb-6 italic text-indigo-600 underline">LUX_VAIP ADMIN</h2>
            <input type="password" id="passInput" placeholder="أدخل الرمز" class="text-center text-2xl tracking-[10px] mb-4 border-2 border-indigo-100">
            <button onclick="checkPass()" class="w-full bg-indigo-600 text-white font-black py-3 rounded-xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">دخول السيرفر</button>
        </div>
    </div>

    <div id="appContent" class="hidden">
        <h1 class="text-2xl font-black italic mb-8 text-center text-slate-800 underline decoration-indigo-500 decoration-4">لوحة تحكم LUX_VAIP السحابية</h1>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="stat-card cash-card"> <p class="text-green-600 text-[10px] font-bold">الكاش المستلم</p> <h2 id="totalCash" class="text-lg font-black text-green-700">0</h2> </div>
            <div class="stat-card"> <p class="text-indigo-600 text-[10px] font-bold">صافي الأرباح</p> <h2 id="soldProfit" class="text-lg font-black text-indigo-700">0</h2> </div>
            <div class="stat-card debt-card"> <p class="text-rose-600 text-[10px] font-bold">إجمالي الديون</p> <h2 id="totalDebts" class="text-lg font-black text-rose-700">0</h2> </div>
            <div class="stat-card"> <p class="text-slate-400 text-[10px] font-bold">قطع المخزن</p> <h2 id="totalQty" class="text-lg font-black text-slate-700">0</h2> </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-10 border border-rose-100">
            <h3 class="font-black mb-4 text-rose-600 italic"><i class="fas fa-user-clock ml-1"></i> سجل مديونيات الزبائن (Live)</h3>
            <div class="overflow-x-auto"><table class="w-full text-right"><tbody id="debtTableBody"></tbody></table></div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-10 border border-slate-200">
            <h3 class="font-black mb-4 text-indigo-600 italic"><i class="fas fa-box-open ml-1"></i> إضافة جهاز جديد ونكهات</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-3 mb-4">
                <input type="text" id="p_name" placeholder="اسم الجهاز">
                <label class="bg-slate-50 p-2.5 rounded-xl text-center text-xs cursor-pointer border border-dashed border-slate-300 text-slate-500 font-bold">📸 صورة <input type="file" accept="image/*" class="hidden" onchange="previewImage(this)"></label>
                <input type="number" id="p_cost" placeholder="سعر الكلفة">
                <input type="number" id="p_sell" placeholder="سعر البيع">
                <select id="p_owner"><option value="mustafa">مخزن مصطفى</option><option value="hussouni">مخزن حسوني</option></select>
            </div>
            <div class="bg-indigo-50 p-4 rounded-xl mb-4 border border-indigo-100 text-right">
                <p class="text-xs font-bold text-indigo-600 mb-2">إضافة النكهات والكميات:</p>
                <div class="flex gap-2">
                    <input type="text" id="f_name" placeholder="اسم النكهة (رقي)" class="bg-white">
                    <input type="number" id="f_qty" placeholder="العدد" class="bg-white w-24">
                    <button onclick="addFlavorToList()" class="bg-indigo-600 text-white px-6 rounded-xl font-bold hover:bg-indigo-700">+</button>
                </div>
                <div id="tempFlavors" class="mt-3 flex flex-wrap"></div>
            </div>
            <button onclick="saveProduct()" class="w-full bg-slate-800 text-white font-black py-3 rounded-xl shadow-lg hover:bg-black transition">رفع البيانات للسيرفر 🚀</button>
        </div>

        <div class="overflow-x-auto bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-10">
            <h3 class="font-black mb-4 italic text-slate-500 underline text-right">المخزون الحالي المتزامن مع المتجر</h3>
            <table class="min-w-full text-right">
                <thead>
                    <tr class="text-[10px] text-slate-400 font-bold uppercase border-b">
                        <th class="p-2">المنتج</th> <th>المخزن</th> <th>النكهات المتوفرة</th> <th>البيع</th> <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="pTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // إعدادات الـ Firebase (مشروعك lux-vaip)
        const firebaseConfig = {
            apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc",
            authDomain: "lux-vaip.firebaseapp.com",
            projectId: "lux-vaip",
            storageBucket: "lux-vaip.firebasestorage.app",
            messagingSenderId: "958955103630",
            appId: "1:958955103630:web:1d3f7f94466021d57b70df"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let base64Img = "";
        let currentFlavors = [];

        function checkPass() {
            if(document.getElementById('passInput').value === "1234") {
                document.getElementById('loginOverlay').remove();
                document.getElementById('appContent').classList.remove('hidden');
                listenToData();
            }
        }

        const irqPrice = (num) => new Intl.NumberFormat('ar-IQ').format(num) + " د.ع";

        function previewImage(input) {
            const reader = new FileReader();
            reader.onload = (e) => base64Img = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }

        function addFlavorToList() {
            const name = document.getElementById('f_name').value;
            const qty = Number(document.getElementById('f_qty').value);
            if(name && qty > 0) {
                currentFlavors.push({ name, qty });
                document.getElementById('f_name').value = '';
                document.getElementById('f_qty').value = '';
                renderTempFlavors();
            }
        }

        function renderTempFlavors() {
            const div = document.getElementById('tempFlavors');
            div.innerHTML = currentFlavors.map((f, i) => `<span class="flavor-tag">${f.name} (${f.qty} ق) <i class="fas fa-times cursor-pointer mr-1 text-red-500" onclick="currentFlavors.splice(${i},1);renderTempFlavors()"></i></span>`).join('');
        }

        function listenToData() {
            // مزامنة المنتجات (عرض المخزن)
            db.collection("products").orderBy("timestamp", "desc").onSnapshot(snap => {
                const tbody = document.getElementById('pTableBody');
                tbody.innerHTML = '';
                let tQty = 0;
                snap.forEach(doc => {
                    const p = doc.data();
                    const id = doc.id;
                    let pTotalQty = 0;
                    let flavorHtml = p.flavors.map(f => {
                        pTotalQty += f.qty;
                        return `<span class="flavor-tag">${f.name} (${f.qty})</span>`;
                    }).join('');
                    tQty += pTotalQty;
                    tbody.innerHTML += `
                        <tr class="border-b">
                            <td class="p-2"><div class="flex items-center gap-2"><img src="${p.img || 'https://via.placeholder.com/50'}" class="w-10 h-10 rounded-lg object-cover"><div class="font-black text-xs">${p.name}</div></div></td>
                            <td class="text-center text-[10px] font-bold text-indigo-500 uppercase">${p.owner}</td>
                            <td>${flavorHtml || '<span class="text-red-400 text-xs">نفذت</span>'}</td>
                            <td class="text-center font-bold text-green-600 text-xs">${irqPrice(p.sell)}</td>
                            <td class="text-left">
                                <div class="flex gap-1 justify-end">
                                    <button onclick="sellFlow('${id}')" class="bg-green-500 text-white px-3 py-1 rounded-lg text-[10px] font-bold shadow-sm shadow-green-100">بيع</button>
                                    <button onclick="deleteProduct('${id}')" class="text-slate-300 hover:text-red-500 px-1"><i class="fas fa-trash"></i></button>
                                </div>
                            </td>
                        </tr>`;
                });
                document.getElementById('totalQty').innerText = tQty;
            });

            // مزامنة الماليات
            db.collection("totals").doc("stats").onSnapshot(doc => {
                const s = doc.data() || { cash: 0, profit: 0 };
                document.getElementById('totalCash').innerText = irqPrice(s.cash);
                document.getElementById('soldProfit').innerText = irqPrice(s.profit);
            });

            // مزامنة الديون
            db.collection("debts").onSnapshot(snap => {
                const dtbody = document.getElementById('debtTableBody');
                dtbody.innerHTML = '';
                let totalD = 0;
                snap.forEach(doc => {
                    const d = doc.data();
                    totalD += d.amount;
                    dtbody.innerHTML += `
                        <tr class="border-b">
                            <td class="p-3 text-right"><div class="font-black text-slate-800 text-sm">${d.name}</div><span class="text-[9px] text-slate-400 italic">${d.details}</span></td>
                            <td class="font-black text-rose-600 text-center text-sm">${irqPrice(d.amount)}</td>
                            <td class="text-left"><button onclick="payDebt('${doc.id}', ${d.amount})" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg text-[10px] font-bold border border-indigo-100">تحصيل</button></td>
                        </tr>`;
                });
                document.getElementById('totalDebts').innerText = irqPrice(totalD);
            });
        }

        async function saveProduct() {
            const name = document.getElementById('p_name').value;
            const sell = Number(document.getElementById('p_sell').value);
            if(!name || currentFlavors.length === 0 || !sell) return alert("أكمل البيانات والنكهات!");

            await db.collection("products").add({
                name: name,
                cost: Number(document.getElementById('p_cost').value),
                sell: sell,
                owner: document.getElementById('p_owner').value,
                img: base64Img,
                flavors: currentFlavors,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            document.getElementById('p_name').value = '';
            document.getElementById('p_cost').value = '';
            document.getElementById('p_sell').value = '';
            currentFlavors = [];
            base64Img = "";
            renderTempFlavors();
            alert("تم الرفع للمتجر بنجاح ✅");
        }

        async function sellFlow(id) {
            const ref = db.collection("products").doc(id);
            const p = (await ref.get()).data();
            
            let msg = "اختر رقم النكهة المباعة:\n";
            p.flavors.forEach((f, i) => msg += `${i + 1} - ${f.name} (متوفر ${f.qty})\n`);
            const choice = prompt(msg);
            const fIdx = parseInt(choice) - 1;

            if(isNaN(fIdx) || !p.flavors[fIdx]) return;
            const selF = p.flavors[fIdx];

            const buyer = prompt("للبيع نقداً اكتب (1) \n للبيع بالدين اكتب (اسم المديون):");
            if(!buyer) return;

            // تحديث الكمية
            selF.qty -= 1;
            const newFlavors = p.flavors.filter(f => f.qty > 0);
            await ref.update({ flavors: newFlavors });

            if(buyer === "1") {
                const sRef = db.collection("totals").doc("stats");
                const s = (await sRef.get()).data() || { cash: 0, profit: 0 };
                await sRef.set({ cash: s.cash + p.sell, profit: s.profit + (p.sell - p.cost) });
                alert("تم البيع كاش ✅");
            } else {
                await db.collection("debts").add({
                    name: buyer,
                    amount: p.sell,
                    details: `جهاز: ${p.name} | نكهة: ${selF.name} | ${new Date().toLocaleDateString('ar-IQ')}`
                });
                alert(`سجل دين على ${buyer} ✅`);
            }
        }

        async function payDebt(id, current) {
            const amt = Number(prompt("المبلغ المستلم:"));
            if(!amt) return;
            const sRef = db.collection("totals").doc("stats");
            const s = (await sRef.get()).data();
            await sRef.update({ cash: s.cash + amt });

            if(amt >= current) await db.collection("debts").doc(id).delete();
            else await db.collection("debts").doc(id).update({ amount: current - amt });
        }

        async function deleteProduct(id) { if(confirm("حذف المنتج نهائياً من المتجر؟")) await db.collection("products").doc(id).delete(); }
    </script>
</body>
</html>
