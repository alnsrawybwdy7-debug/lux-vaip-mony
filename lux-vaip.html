<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة LUX_VAIP | النسخة الاحترافية</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        #authOverlay { position: fixed; inset: 0; background: #020617; z-index: 999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .stat-card { background: white; border-radius: 1rem; padding: 15px; border-right: 5px solid #6366f1; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; position: relative; }
        input, select { border: 1px solid #cbd5e1; border-radius: 0.75rem; padding: 10px; font-size: 14px; width: 100%; outline: none; transition: 0.3s; }
        .flavor-tag { background: #e0e7ff; color: #4338ca; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; margin: 2px; display: inline-block; border: 1px solid #c7d2fe; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { background: white; padding: 12px; border-top: 1px solid #eee; border-bottom: 1px solid #eee; text-align: right; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="authOverlay">
        <div class="w-12 h-12 bg-indigo-600 rounded-xl mb-6 flex items-center justify-center shadow-lg"><i class="fas fa-user-shield text-white text-xl"></i></div>
        <input type="password" id="adminPass" placeholder="رمز الدخول" class="max-w-[200px] text-center bg-white/10 border-white/20 text-white mb-4 rounded-xl p-2 outline-none">
        <button onclick="checkAuth()" class="bg-indigo-600 text-white px-12 py-2 rounded-xl font-bold hover:bg-indigo-700 transition">دخول</button>
    </div>

    <div id="editModal" class="modal">
        <div class="bg-white p-6 rounded-3xl w-full max-w-md shadow-2xl">
            <h3 class="font-black text-indigo-600 mb-4 border-b pb-2">تعديل المنتج / إضافة نكهات</h3>
            <input type="hidden" id="edit_id">
            <div class="space-y-3">
                <div><label class="text-[10px] font-bold text-slate-400">سعر الكلفة</label><input type="number" id="edit_cost"></div>
                <div><label class="text-[10px] font-bold text-slate-400">سعر البيع</label><input type="number" id="edit_sell"></div>
                <div class="bg-slate-50 p-3 rounded-xl border border-dashed border-slate-300">
                    <p class="text-xs font-bold mb-2">إضافة نكهة جديدة لهذا المنتج:</p>
                    <div class="flex gap-2">
                        <input type="text" id="new_f_name" placeholder="النكهة" class="text-xs">
                        <input type="number" id="new_f_qty" placeholder="العدد" class="text-xs w-20">
                        <button onclick="addNewFlavorToProduct()" class="bg-green-600 text-white px-3 rounded-lg text-xs">+</button>
                    </div>
                </div>
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="updateProductData()" class="flex-grow bg-indigo-600 text-white py-2 rounded-xl font-bold shadow-lg">حفظ التغييرات</button>
                <button onclick="document.getElementById('editModal').style.display='none'" class="bg-slate-200 px-4 rounded-xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="opacity-0 transition-opacity duration-700">
        <div class="flex justify-between items-center mb-6">
             <button onclick="logout()" class="text-red-500 text-sm font-bold"><i class="fas fa-sign-out-alt"></i> خروج</button>
             <h1 class="text-xl font-black italic text-slate-800 underline decoration-indigo-500 decoration-4">لوحة تحكم LUX_VAIP</h1>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10 text-right">
            <div class="stat-card"> <i class="fas fa-redo absolute top-2 left-2 text-[10px] text-red-400 cursor-pointer" onclick="resetFinance()"></i> <p class="text-green-600 text-[10px] font-bold">الكاش المستلم</p> <h2 id="totalCash" class="text-lg font-black text-green-700">0</h2> </div>
            <div class="stat-card"> <p class="text-indigo-600 text-[10px] font-bold">صافي الأرباح</p> <h2 id="soldProfit" class="text-lg font-black text-indigo-700">0</h2> </div>
            <div class="stat-card"> <p class="text-rose-600 text-[10px] font-bold">إجمالي الديون</p> <h2 id="totalDebts" class="text-lg font-black text-rose-700">0</h2> </div>
            <div class="stat-card"> <p class="text-slate-400 text-[10px] font-bold">قطع المخزن</p> <h2 id="totalQty" class="text-lg font-black text-slate-700">0</h2> </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-10 border border-slate-200 text-right">
            <h3 class="font-black mb-4 text-indigo-600 italic">إضافة بضاعة جديدة</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
                <input type="text" id="p_name" placeholder="اسم الجهاز">
                <input type="number" id="p_cost" placeholder="سعر الكلفة">
                <input type="number" id="p_sell" placeholder="سعر البيع">
                <input type="file" accept="image/*" onchange="previewImage(this)" class="text-[10px] p-1">
            </div>
            <div class="bg-indigo-50 p-4 rounded-xl mb-4 border border-indigo-100">
                <div class="flex gap-2">
                    <input type="text" id="f_name" placeholder="النكهة" class="bg-white">
                    <input type="number" id="f_qty" placeholder="العدد" class="bg-white w-20">
                    <button onclick="addFlavorToList()" class="bg-indigo-600 text-white px-6 rounded-xl font-bold">+</button>
                </div>
                <div id="tempFlavors" class="mt-3 flex flex-wrap"></div>
            </div>
            <button onclick="saveProduct()" class="w-full bg-slate-900 text-white font-black py-3 rounded-xl shadow-xl hover:bg-black transition">حفظ ورفع للمتجر 🚀</button>
        </div>

        <div class="overflow-x-auto bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-10">
            <h3 class="font-black mb-4 italic text-slate-500 underline text-right uppercase">المخزن الحالي</h3>
            <table class="min-w-full">
                <thead>
                    <tr class="text-[10px] text-slate-400 font-bold uppercase">
                        <th>المنتج</th> <th>النكهات</th> <th>الكلفة</th> <th>البيع</th> <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="pTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const CORRECT_PASS = "1221"; 
        let db;
        let base64Img = "";
        let currentFlavors = [];
        let allLiveProducts = {};

        // فحص الدخول عند تحميل الصفحة
        window.onload = () => {
            if (localStorage.getItem('admin_logged_in') === 'true') {
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('mainContent').classList.remove('opacity-0');
                initFirebase();
            }
        };

        function checkAuth() {
            if(document.getElementById('adminPass').value === CORRECT_PASS) {
                localStorage.setItem('admin_logged_in', 'true');
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('mainContent').classList.remove('opacity-0');
                initFirebase();
            } else {
                alert("الرمز خطأ!");
            }
        }

        function logout() {
            localStorage.removeItem('admin_logged_in');
            location.reload();
        }

        function initFirebase() {
            const firebaseConfig = {
                apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc",
                databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/",
                projectId: "lux-vaip"
            };
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            loadLive();
        }

        const irqPrice = (num) => new Intl.NumberFormat('ar-IQ').format(num) + " د.ع";

        window.previewImage = (input) => {
            const reader = new FileReader();
            reader.onload = (e) => base64Img = e.target.result;
            reader.readAsDataURL(input.files[0]);
        };

        window.addFlavorToList = () => {
            const n = document.getElementById('f_name').value;
            const q = Number(document.getElementById('f_qty').value);
            if(n && q > 0) {
                currentFlavors.push({ name: n, qty: q });
                document.getElementById('f_name').value = '';
                document.getElementById('f_qty').value = '';
                renderTemp();
            }
        };

        function renderTemp() {
            document.getElementById('tempFlavors').innerHTML = currentFlavors.map((f, i) => `<span class="flavor-tag">${f.name} (${f.qty}) <i class="fas fa-times cursor-pointer text-red-500 mr-1" onclick="currentFlavors.splice(${i},1);renderTemp()"></i></span>`).join('');
        }

        window.saveProduct = () => {
            const n = document.getElementById('p_name').value;
            const s = Number(document.getElementById('p_sell').value);
            if(!n || !s || currentFlavors.length === 0) return alert("اكمل البيانات!");
            db.ref('products').push({
                name: n, sell: s, cost: Number(document.getElementById('p_cost').value),
                img: base64Img, flavors: currentFlavors
            }).then(() => {
                alert("تم الرفع بنجاح ✅");
                location.reload();
            });
        };

        function loadLive() {
            db.ref().on('value', snap => {
                const data = snap.val() || {};
                const prods = data.products || {};
                allLiveProducts = prods;
                const stats = data.stats || { cash: 0, profit: 0 };
                const debts = data.debts || {};

                document.getElementById('totalCash').innerText = irqPrice(stats.cash);
                document.getElementById('soldProfit').innerText = irqPrice(stats.profit);

                const pt = document.getElementById('pTableBody');
                pt.innerHTML = '';
                let tQty = 0;
                Object.keys(prods).forEach(id => {
                    const p = prods[id];
                    let pq = 0;
                    let fHtml = p.flavors ? p.flavors.map(f => { pq += f.qty; return `<span class="flavor-tag">${f.name} (${f.qty})</span>` }).join('') : '';
                    tQty += pq;
                    pt.innerHTML += `<tr class="border-b">
                        <td><div class="flex items-center gap-2"><img src="${p.img}" class="w-8 h-8 rounded object-cover"><b>${p.name}</b></div></td>
                        <td>${fHtml}</td>
                        <td class="text-slate-400 text-[10px] font-bold">${irqPrice(p.cost)}</td>
                        <td class="font-bold text-green-600 text-sm">${irqPrice(p.sell)}</td>
                        <td class="flex gap-2 justify-end">
                            <button onclick="sellFlow('${id}')" class="bg-green-500 text-white px-3 py-1 rounded text-[10px] font-bold">بيع</button>
                            <button onclick="openEditModal('${id}')" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded text-[10px] font-bold border border-indigo-100">تعديل</button>
                            <button onclick="db.ref('products/${id}').remove()" class="text-slate-200 ml-2"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
                });
                document.getElementById('totalQty').innerText = tQty;
            });
        }

        window.openEditModal = (id) => {
            const p = allLiveProducts[id];
            document.getElementById('edit_id').value = id;
            document.getElementById('edit_cost').value = p.cost;
            document.getElementById('edit_sell').value = p.sell;
            document.getElementById('editModal').style.display = 'flex';
        };

        window.updateProductData = () => {
            const id = document.getElementById('edit_id').value;
            db.ref('products/' + id).update({
                cost: Number(document.getElementById('edit_cost').value),
                sell: Number(document.getElementById('edit_sell').value)
            });
            document.getElementById('editModal').style.display = 'none';
        };

        window.addNewFlavorToProduct = () => {
            const id = document.getElementById('edit_id').value;
            const n = document.getElementById('new_f_name').value;
            const q = Number(document.getElementById('new_f_qty').value);
            if(!n || q <= 0) return;
            const p = allLiveProducts[id];
            if(!p.flavors) p.flavors = [];
            p.flavors.push({ name: n, qty: q });
            db.ref('products/' + id).update({ flavors: p.flavors });
            document.getElementById('new_f_name').value = '';
            document.getElementById('new_f_qty').value = '';
        };

        window.resetFinance = () => { if(confirm("تصفير الحسابات؟")) db.ref('stats').set({ cash: 0, profit: 0 }); };

        window.sellFlow = async (id) => {
            const p = allLiveProducts[id];
            if(!p.flavors) return;
            let msg = "اختر النكهة:\n" + p.flavors.map((f, i) => `${i+1} - ${f.name} (${f.qty})`).join('\n');
            const fIdx = parseInt(prompt(msg)) - 1;
            if(isNaN(fIdx) || !p.flavors[fIdx]) return;
            const buyer = prompt("كاش (1) / دين (الاسم):");
            if(!buyer) return;
            p.flavors[fIdx].qty -= 1;
            await db.ref('products/' + id).update({ flavors: p.flavors.filter(f => f.qty > 0) });
            if(buyer === "1") {
                const s = (await db.ref('stats').get()).val() || { cash: 0, profit: 0 };
                await db.ref('stats').set({ cash: s.cash + p.sell, profit: s.profit + (p.sell - p.cost) });
            } else {
                await db.ref('debts').push({ name: buyer, amount: p.sell, details: p.name + ' - ' + p.flavors[fIdx].name });
            }
        };
    </script>
</body>
</html>
