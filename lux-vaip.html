<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة LUX_VAIP | نظام الأرباح الذكي</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .stat-card { background: white; border-radius: 1rem; padding: 15px; border-right: 5px solid #6366f1; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .bg-cash { border-right-color: #22c55e; } /* لون أرباح البيع */
        input, select, textarea { border: 1px solid #cbd5e1; border-radius: 0.75rem; padding: 10px; width: 100%; font-size: 14px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 5px; }
        td { background: white; padding: 12px; }
        .btn-sell { background: #22c55e; color: white; padding: 5px 10px; border-radius: 8px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body class="p-4">

    <div id="loginSection" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-2xl w-full max-w-sm text-center">
            <h2 class="text-xl font-black mb-4 italic">LUX_VAIP LOGIN</h2>
            <input type="password" id="passInput" class="text-center mb-4" placeholder="رمز الدخول">
            <button onclick="login()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-black">دخول</button>
        </div>
    </div>

    <div id="mainSection" style="display:none;">
        <h1 class="text-2xl font-black italic mb-6">لوحة التحكم <span class="text-indigo-600">المالية</span></h1>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="stat-card">
                <p class="text-gray-400 text-[10px] font-bold uppercase">بضاعة المخزن</p>
                <h2 id="totalQty" class="text-xl font-black text-indigo-600">0</h2>
            </div>
            <div class="stat-card">
                <p class="text-gray-400 text-[10px] font-bold uppercase">قيمة المخزن (بيع)</p>
                <h2 id="totalValue" class="text-xl font-black text-slate-700">0</h2>
            </div>
            <div class="stat-card bg-cash">
                <p class="text-green-600 text-[10px] font-bold uppercase">أرباح المبيعات (بجيبك)</p>
                <h2 id="soldProfit" class="text-xl font-black text-green-600">0</h2>
            </div>
            <div class="stat-card !border-amber-500">
                <p class="text-amber-600 text-[10px] font-bold uppercase">أرباح المخزن المتبقية</p>
                <h2 id="totalProfit" class="text-xl font-black text-amber-600">0</h2>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 border">
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-3">
                <input type="text" id="p_name" placeholder="اسم المنتج">
                <input type="file" id="p_file" accept="image/*" class="hidden" onchange="previewImage(this)">
                <label for="p_file" class="bg-slate-100 p-2.5 rounded-xl text-center text-xs cursor-pointer">📸 صورة</label>
                <input type="number" id="p_cost" placeholder="سعر الكلفة">
                <input type="number" id="p_sell" placeholder="سعر البيع">
                <input type="number" id="p_qty" placeholder="الكمية">
                <select id="p_owner">
                    <option value="mustafa">مخزن مصطفى</option>
                    <option value="hussouni">مخزن حسوني</option>
                </select>
                <textarea id="p_desc" class="md:col-span-3 lg:col-span-5" placeholder="الوصف..."></textarea>
                <button onclick="saveProduct()" class="bg-indigo-600 text-white font-black rounded-xl">حفظ</button>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table>
                <thead>
                    <tr class="text-xs text-gray-400 uppercase">
                        <th>المنتج</th> <th>الكمية</th> <th>البيع</th> <th>الربح/ق</th> <th>المخزن</th> <th>البيع اليومي</th> <th>حذف</th>
                    </tr>
                </thead>
                <tbody id="pTableBody"></tbody>
            </table>
        </div>

        <footer class="mt-10 text-center py-6 text-[10px] font-bold text-gray-400 italic">
            Developed by Abdullah-Abd-Alsalam
            <button onclick="resetSales()" class="block mx-auto mt-4 text-red-400 underline">تصفير أرباح المبيعات اليومية</button>
        </footer>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc",
            authDomain: "lux-vaip.firebaseapp.com",
            projectId: "lux-vaip",
            storageBucket: "lux-vaip.firebasestorage.app",
            messagingSenderId: "958955103630",
            appId: "1:958955103630:web:1d3f7f94466021d57b70df",
            measurementId: "G-NET3PPRG11",
            databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let base64Img = "";

        function login() { if(document.getElementById('passInput').value==="1234"){document.getElementById('loginSection').style.display='none';document.getElementById('mainSection').style.display='block';fetchData();}}

        function previewImage(input) {
            const reader = new FileReader();
            reader.onload = (e) => base64Img = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }

        function fetchData() {
            db.ref('luxVaipData').on('value', (snap) => {
                const data = snap.val();
                const tbody = document.getElementById('pTableBody');
                tbody.innerHTML = '';
                let tQty = 0, tProfit = 0, tValue = 0;
                let sProfit = data?.salesProfit || 0; // جلب الأرباح التي تم بيعها فعلياً

                if(data) {
                    ['mustafa', 'hussouni'].forEach(owner => {
                        if(data[owner]?.products) {
                            data[owner].products.forEach((p, idx) => {
                                const profitPerPiece = p.sell - (p.cost || 0);
                                tQty += Number(p.qty); 
                                tValue += (p.sell * p.qty); 
                                tProfit += (profitPerPiece * p.qty);

                                tbody.innerHTML += `
                                    <tr>
                                        <td class="flex items-center gap-2 font-bold"><img src="${p.img}" class="w-8 h-8 rounded">${p.name}</td>
                                        <td class="font-black text-indigo-600">${p.qty}</td>
                                        <td>${Number(p.sell).toLocaleString()}</td>
                                        <td class="text-green-600 font-bold text-xs">+${profitPerPiece.toLocaleString()}</td>
                                        <td class="text-[10px] text-gray-400 uppercase font-bold">${owner}</td>
                                        <td><button onclick="sellPiece('${owner}', ${idx}, ${p.qty}, ${profitPerPiece})" class="btn-sell" ${p.qty<=0?'disabled':''}>تم البيع</button></td>
                                        <td><button onclick="delItem('${owner}', ${idx})" class="text-red-300"><i class="fas fa-trash text-xs"></i></button></td>
                                    </tr>`;
                            });
                        }
                    });
                }
                document.getElementById('totalQty').innerText = tQty;
                document.getElementById('totalValue').innerText = tValue.toLocaleString();
                document.getElementById('totalProfit').innerText = tProfit.toLocaleString();
                document.getElementById('soldProfit').innerText = sProfit.toLocaleString();
            });
        }

        function sellPiece(owner, idx, currentQty, profit) {
            if(currentQty > 0) {
                // 1. تنقيص الكمية من المخزن
                db.ref(`luxVaipData/${owner}/products/${idx}/qty`).set(currentQty - 1);
                
                // 2. إضافة الربح لسجل المبيعات الكلي (بجيبك)
                db.ref(`luxVaipData/salesProfit`).once('value', (s) => {
                    const currentSalesProfit = s.val() || 0;
                    db.ref(`luxVaipData/salesProfit`).set(currentSalesProfit + profit);
                });
            }
        }

        function resetSales() {
            if(confirm("هل تريد تصفير سجل أرباح المبيعات اليوم؟")) {
                db.ref(`luxVaipData/salesProfit`).set(0);
            }
        }

        function saveProduct() {
            const owner = document.getElementById('p_owner').value;
            const newItem = {
                name: document.getElementById('p_name').value,
                desc: document.getElementById('p_desc').value,
                img: base64Img,
                cost: Number(document.getElementById('p_cost').value),
                sell: Number(document.getElementById('p_sell').value),
                qty: Number(document.getElementById('p_qty').value)
            };
            db.ref(`luxVaipData/${owner}/products`).once('value', (snap) => {
                let list = snap.val() || [];
                list.push(newItem);
                db.ref(`luxVaipData/${owner}/products`).set(list).then(()=>location.reload());
            });
        }

        function delItem(owner, idx) { if(confirm("حذف؟")) { db.ref(`luxVaipData/${owner}/products`).once('value', (snap) => { let list = snap.val(); list.splice(idx, 1); db.ref(`luxVaipData/${owner}/products`).set(list); }); } }
    </script>
</body>
</html>
