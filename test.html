<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة LUX_VAIP | النسخة المتكاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .stat-card { background: white; border-radius: 1rem; padding: 15px; border-right: 5px solid #6366f1; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .cash-card { border-right-color: #22c55e; background: #f0fdf4; }
        .debt-card { border-right-color: #e11d48; background: #fff1f2; }
        input, select, textarea { border: 1px solid #cbd5e1; border-radius: 0.75rem; padding: 10px; font-size: 14px; width: 100%; outline: none; }
        input:focus { border-color: #6366f1; ring: 2px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { background: white; padding: 12px; border-top: 1px solid #eee; border-bottom: 1px solid #eee; text-align: right; }
        .flavor-tag { background: #e0e7ff; color: #4338ca; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; margin: 2px; display: inline-block; border: 1px solid #c7d2fe; }
    </style>
</head>
<body class="p-4 md:p-8">

    <h1 class="text-2xl font-black italic mb-8 text-center text-slate-800 underline decoration-indigo-500 decoration-4">لوحة تحكم LUX_VAIP</h1>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
        <div class="stat-card cash-card"> <p class="text-green-600 text-[10px] font-bold">الكاش المستلم</p> <h2 id="totalCash" class="text-lg font-black text-green-700">0</h2> </div>
        <div class="stat-card"> <p class="text-indigo-600 text-[10px] font-bold">صافي الأرباح</p> <h2 id="soldProfit" class="text-lg font-black text-indigo-700">0</h2> </div>
        <div class="stat-card debt-card"> <p class="text-rose-600 text-[10px] font-bold">إجمالي الديون</p> <h2 id="totalDebts" class="text-lg font-black text-rose-700">0</h2> </div>
        <div class="stat-card"> <p class="text-slate-400 text-[10px] font-bold">قطع المخزن</p> <h2 id="totalQty" class="text-lg font-black text-slate-700">0</h2> </div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm mb-10 border border-rose-100">
        <h3 class="font-black mb-4 text-rose-600 italic"><i class="fas fa-user-clock ml-1"></i> سجل مديونيات الزبائن</h3>
        <div class="overflow-x-auto"><table class="w-full"><tbody id="debtTableBody"></tbody></table></div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm mb-10 border border-slate-200">
        <h3 class="font-black mb-4 text-indigo-600 italic"><i class="fas fa-box-open ml-1"></i> إضافة جهاز جديد ونكهات</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-3 mb-4">
            <input type="text" id="p_name" placeholder="اسم الجهاز">
            <label class="bg-slate-50 p-2.5 rounded-xl text-center text-xs cursor-pointer border border-dashed border-slate-300 text-slate-500 font-bold">📸 صورة <input type="file" accept="image/*" class="hidden" onchange="previewImage(this)"></label>
            <input type="number" id="p_cost" placeholder="سعر الكلفة">
            <input type="number" id="p_sell" placeholder="سعر البيع">
            <select id="p_owner"><option value="mustafa">مخزن مصطفى</option><option value="hussouni">مخزن حسوني</option></select>
        </div>
        <div class="bg-indigo-50 p-4 rounded-xl mb-4 border border-indigo-100">
            <p class="text-xs font-bold text-indigo-600 mb-2">إضافة النكهات والكميات:</p>
            <div class="flex gap-2">
                <input type="text" id="f_name" placeholder="اسم النكهة (مثلاً: رقي)" class="bg-white">
                <input type="number" id="f_qty" placeholder="العدد" class="bg-white w-24">
                <button onclick="addFlavorToList()" class="bg-indigo-600 text-white px-6 rounded-xl font-bold hover:bg-indigo-700">+</button>
            </div>
            <div id="tempFlavors" class="mt-3 flex flex-wrap"></div>
        </div>
        <button onclick="saveProduct()" class="w-full bg-slate-800 text-white font-black py-3 rounded-xl shadow-lg hover:bg-black transition">حفظ المنتج والمخزون</button>
    </div>

    <div class="overflow-x-auto bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-10">
        <h3 class="font-black mb-4 italic text-slate-500 underline">المخزون الحالي</h3>
        <table class="min-w-full">
            <thead>
                <tr class="text-[10px] text-slate-400 font-bold uppercase">
                    <th>المنتج</th> <th>المخزن</th> <th>النكهات المتوفرة</th> <th>سعر البيع</th> <th>إجراء</th>
                </tr>
            </thead>
            <tbody id="pTableBody"></tbody>
        </table>
    </div>

    <script>
        let localData = JSON.parse(localStorage.getItem('lux_v10_final')) || {
            mustafa: [], hussouni: [], debts: [], salesProfit: 0, totalCashReceived: 0
        };
        let base64Img = "";
        let currentFlavors = [];

        const irqPrice = (num) => new Intl.NumberFormat('ar-IQ').format(num) + " د.ع";

        function previewImage(input) {
            const reader = new FileReader();
            reader.onload = (e) => base64Img = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }

        function addFlavorToList() {
            const name = document.getElementById('f_name').value;
            const qty = Number(document.getElementById('f_qty').value);
            if(name && qty > 0) {
                currentFlavors.push({ name, qty });
                document.getElementById('f_name').value = '';
                document.getElementById('f_qty').value = '';
                renderTempFlavors();
            }
        }

        function renderTempFlavors() {
            const div = document.getElementById('tempFlavors');
            div.innerHTML = currentFlavors.map((f, i) => `<span class="flavor-tag">${f.name} (${f.qty} ق) <i class="fas fa-times cursor-pointer mr-1 text-red-500" onclick="currentFlavors.splice(${i},1);renderTempFlavors()"></i></span>`).join('');
        }

        function saveData() {
            localStorage.setItem('lux_v10_final', JSON.stringify(localData));
            renderAll();
        }

        function renderAll() {
            const tbody = document.getElementById('pTableBody');
            tbody.innerHTML = '';
            let tQty = 0;

            ['mustafa', 'hussouni'].forEach(owner => {
                localData[owner].forEach((p, idx) => {
                    let pTotalQty = 0;
                    let flavorHtml = p.flavors.map(f => {
                        pTotalQty += f.qty;
                        return `<span class="flavor-tag">${f.name} (${f.qty})</span>`;
                    }).join('');
                    tQty += pTotalQty;
                    
                    tbody.innerHTML += `
                        <tr class="border-b">
                            <td>
                                <div class="flex items-center gap-3">
                                    <img src="${p.img || 'https://via.placeholder.com/50'}" class="w-12 h-12 rounded-lg object-cover">
                                    <div class="font-black text-slate-800 text-sm">${p.name}</div>
                                </div>
                            </td>
                            <td class="text-center text-[10px] font-bold text-indigo-500 uppercase">${owner}</td>
                            <td>${flavorHtml || '<span class="text-red-400 text-xs">نفذت</span>'}</td>
                            <td class="text-center font-bold text-green-600 text-sm">${irqPrice(p.sell)}</td>
                            <td class="text-left flex gap-2 justify-end">
                                <button onclick="sellFlow('${owner}', ${idx})" class="bg-green-500 text-white px-4 py-1.5 rounded-lg text-xs font-bold">بيع</button>
                                <button onclick="deleteProduct('${owner}', ${idx})" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>`;
                });
            });

            const dtbody = document.getElementById('debtTableBody');
            dtbody.innerHTML = '';
            let totalD = 0;
            localData.debts.forEach((d, idx) => {
                if(d.amount > 0) totalD += d.amount;
                dtbody.innerHTML += `
                    <tr class="border-b">
                        <td><div class="font-black text-slate-800">${d.name}</div><span class="text-[10px] text-slate-400 italic">${d.details}</span></td>
                        <td class="font-black ${d.amount <= 0 ? 'text-green-600 text-xs' : 'text-rose-600'} text-center">${d.amount <= 0 ? 'تم الدفع ✅' : irqPrice(d.amount)}</td>
                        <td class="text-left">
                            ${d.amount > 0 ? `<button onclick="payDebt(${idx})" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg text-xs font-bold border border-indigo-100">تحصيل</button>` : ''}
                            <button onclick="localData.debts.splice(${idx},1);saveData()" class="text-slate-200 mr-2"><i class="fas fa-times-circle text-lg"></i></button>
                        </td>
                    </tr>`;
            });

            document.getElementById('totalQty').innerText = tQty;
            document.getElementById('soldProfit').innerText = irqPrice(localData.salesProfit);
            document.getElementById('totalCash').innerText = irqPrice(localData.totalCashReceived);
            document.getElementById('totalDebts').innerText = irqPrice(totalD);
        }

        function saveProduct() {
            const owner = document.getElementById('p_owner').value;
            if(currentFlavors.length === 0) return alert("أضف نكهة واحدة على الأقل!");
            const item = {
                name: document.getElementById('p_name').value,
                img: base64Img,
                cost: Number(document.getElementById('p_cost').value),
                sell: Number(document.getElementById('p_sell').value),
                flavors: [...currentFlavors]
            };
            if(!item.name || !item.sell) return alert("اكمل البيانات الأساسية!");
            localData[owner].push(item);
            base64Img = ""; currentFlavors = []; 
            document.getElementById('p_name').value = '';
            renderTempFlavors();
            saveData();
            alert("تم الحفظ بنجاح ✅");
        }

        function sellFlow(owner, idx) {
            const p = localData[owner][idx];
            if(p.flavors.length === 0) return alert("لا توجد نكهات!");

            let msg = "اختر رقم النكهة:\n";
            p.flavors.forEach((f, i) => msg += `${i + 1} - ${f.name} (متوفر ${f.qty})\n`);
            const choice = prompt(msg);
            const fIdx = parseInt(choice) - 1;

            if(isNaN(fIdx) || !p.flavors[fIdx]) return alert("اختيار خاطئ!");
            const selF = p.flavors[fIdx];

            const buyer = prompt("للبيع نقداً اكتب (1) \n للبيع بالدين اكتب (اسم الشخص):");
            if(!buyer) return;

            // خصم نكهة واحدة
            selF.qty -= 1;
            if(selF.qty <= 0) p.flavors.splice(fIdx, 1);

            if(buyer === "1") {
                localData.salesProfit += (p.sell - p.cost);
                localData.totalCashReceived += p.sell;
                alert(`تم بيع نكهة ${selF.name} نقداً ✅`);
            } else {
                localData.debts.push({
                    name: buyer,
                    amount: p.sell,
                    details: `الجهاز: ${p.name} | النكهة: ${selF.name} | ${new Date().toLocaleDateString('ar-IQ')}`
                });
                alert(`تم تسجيل دين على ${buyer} ✅`);
            }
            saveData();
        }

        function payDebt(idx) {
            const val = prompt("المبلغ المستلم:");
            if(val) {
                const amt = Number(val);
                localData.totalCashReceived += amt;
                localData.debts[idx].amount -= amt;
                saveData();
            }
        }

        function deleteProduct(owner, idx) { if(confirm("حذف؟")) { localData[owner].splice(idx, 1); saveData(); } }

        renderAll();
    </script>
</body>
</html>
