<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX_VAIP | نظام إدارة الفيب الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .stat-card { background: white; border-radius: 1rem; padding: 15px; border-right: 5px solid #6366f1; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .cash-card { border-right-color: #22c55e; background: #f0fdf4; }
        .debt-card { border-right-color: #e11d48; background: #fff1f2; }
        input, select, textarea { border: 1px solid #cbd5e1; border-radius: 0.75rem; padding: 10px; font-size: 14px; width: 100%; outline-color: #6366f1; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { background: white; padding: 12px; border-top: 1px solid #eee; border-bottom: 1px solid #eee; text-align: right; }
        .flavor-badge { background: #e0e7ff; color: #4338ca; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; margin: 2px; display: inline-block; }
        .debt-info { font-size: 11px; color: #64748b; border-right: 3px solid #e11d48; padding-right: 8px; margin-top: 4px; display: block; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="mb-10 text-center">
        <h1 class="text-3xl font-black italic text-slate-800">إدارة <span class="text-indigo-600">LUX_VAIP</span></h1>
        <p class="text-slate-400 text-sm mt-1 font-bold">نظام تتبع النكهات والمبيعات والديون</p>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-10">
        <div class="stat-card cash-card">
            <p class="text-green-600 text-[10px] font-black uppercase italic">الكاش المستلم</p>
            <h2 id="totalCash" class="text-lg font-black text-green-700">0</h2>
        </div>
        <div class="stat-card">
            <p class="text-indigo-600 text-[10px] font-black uppercase italic">صافي الأرباح</p>
            <h2 id="soldProfit" class="text-lg font-black text-indigo-700">0</h2>
        </div>
        <div class="stat-card debt-card">
            <p class="text-rose-600 text-[10px] font-black uppercase italic">إجمالي الديون</p>
            <h2 id="totalDebts" class="text-lg font-black text-rose-700">0</h2>
        </div>
        <div class="stat-card">
            <p class="text-slate-400 text-[10px] font-bold italic">قطع المخزن</p>
            <h2 id="totalQty" class="text-lg font-black text-slate-700">0</h2>
        </div>
        <div class="stat-card">
            <p class="text-amber-500 text-[10px] font-bold italic">أرباح المخزن</p>
            <h2 id="totalProfit" class="text-lg font-black text-amber-600">0</h2>
        </div>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow-sm mb-10 border border-rose-100">
        <h3 class="font-black mb-4 text-rose-600 italic text-lg"><i class="fas fa-file-invoice-dollar ml-1"></i> سجل الديون والتحصيل</h3>
        <div class="overflow-x-auto">
            <table class="min-w-full">
                <tbody id="debtTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow-sm mb-10 border border-slate-200">
        <h3 class="font-black mb-4 text-indigo-600 italic"><i class="fas fa-plus-circle ml-1"></i> إضافة منتج ونكهات</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <input type="text" id="p_name" placeholder="اسم الجهاز (مثلاً: سحبة Vaporesso)">
            <input type="number" id="p_cost" placeholder="سعر الكلفة">
            <input type="number" id="p_sell" placeholder="سعر البيع">
            <select id="p_owner">
                <option value="mustafa">مخزن مصطفى</option>
                <option value="hussouni">مخزن حسوني</option>
            </select>
            <input type="text" id="p_flavors" class="md:col-span-2" placeholder="النكهات المتوفرة (افصل بينها بفاصلة , مثلاً: علكة, رقي, تفاح)">
        </div>
        <button onclick="saveProduct()" class="w-full bg-indigo-600 text-white font-black py-3 rounded-2xl hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition">حفظ في المخزون</button>
    </div>

    <div class="overflow-x-auto bg-white p-5 rounded-3xl shadow-sm border border-slate-200">
        <h3 class="font-black mb-4 italic text-slate-500 underline decoration-2">المخزون الحالي</h3>
        <table class="min-w-full">
            <thead>
                <tr class="text-[10px] text-slate-400 uppercase font-bold">
                    <th class="pb-3 text-right">المنتج والنكهات</th>
                    <th class="pb-3 text-center">المخزن</th>
                    <th class="pb-3 text-center">سعر البيع</th>
                    <th class="pb-3 text-left">إجراء</th>
                </tr>
            </thead>
            <tbody id="pTableBody"></tbody>
        </table>
    </div>

    <script>
        // قاعدة البيانات المحلية
        let localData = JSON.parse(localStorage.getItem('lux_v9_master')) || {
            mustafa: [], hussouni: [], debts: [], salesProfit: 0, totalCashReceived: 0
        };

        const irqPrice = (num) => new Intl.NumberFormat('ar-IQ').format(num) + " د.ع";

        function saveData() {
            localStorage.setItem('lux_v9_master', JSON.stringify(localData));
            renderAll();
        }

        function renderAll() {
            // رندر المخزن
            const tbody = document.getElementById('pTableBody');
            tbody.innerHTML = '';
            let tQty = 0, tPotentialProfit = 0;

            ['mustafa', 'hussouni'].forEach(owner => {
                localData[owner].forEach((p, idx) => {
                    tQty += p.flavors.length;
                    tPotentialProfit += (p.sell - p.cost) * p.flavors.length;
                    let flavorHtml = p.flavors.map(f => `<span class="flavor-badge">${f}</span>`).join('');
                    
                    tbody.innerHTML += `
                        <tr class="border-b">
                            <td class="py-4">
                                <div class="font-black text-slate-800 text-sm">${p.name}</div>
                                <div class="mt-1">${flavorHtml || '<span class="text-red-500 text-[10px]">نفذت النكهات</span>'}</div>
                            </td>
                            <td class="text-center text-[10px] font-bold text-indigo-500 uppercase">${owner}</td>
                            <td class="text-center font-bold text-green-600 text-sm">${irqPrice(p.sell)}</td>
                            <td class="text-left">
                                <div class="flex gap-2 justify-end">
                                    <button onclick="sellFlow('${owner}', ${idx})" class="bg-green-500 text-white px-4 py-1.5 rounded-xl text-xs font-bold shadow-sm">بيع</button>
                                    <button onclick="deleteProduct('${owner}', ${idx})" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                                </div>
                            </td>
                        </tr>`;
                });
            });

            // رندر الديون
            const dtbody = document.getElementById('debtTableBody');
            dtbody.innerHTML = '';
            let totalD = 0;
            localData.debts.forEach((d, idx) => {
                const isPaid = d.amount <= 0;
                if(!isPaid) totalD += d.amount;
                dtbody.innerHTML += `
                    <tr class="border-b">
                        <td class="py-3">
                            <div class="font-black text-slate-800">${d.name}</div>
                            <span class="debt-info italic">${d.itemDetails}</span>
                        </td>
                        <td class="font-black text-center ${isPaid ? 'text-green-600 text-xs' : 'text-rose-600'}">
                            ${isPaid ? 'تم دفع الدين كامل ✅' : irqPrice(d.amount)}
                        </td>
                        <td class="text-left">
                            <div class="flex items-center gap-2 justify-end">
                                ${!isPaid ? `<button onclick="payDebt(${idx})" class="bg-green-100 text-green-700 px-4 py-1 rounded-lg text-xs font-bold">تحصيل</button>` : ''}
                                <button onclick="deleteDebt(${idx})" class="text-slate-200 hover:text-slate-400"><i class="fas fa-times-circle text-lg"></i></button>
                            </div>
                        </td>
                    </tr>`;
            });

            // تحديث العدادات
            document.getElementById('totalQty').innerText = tQty;
            document.getElementById('totalProfit').innerText = irqPrice(tPotentialProfit);
            document.getElementById('soldProfit').innerText = irqPrice(localData.salesProfit);
            document.getElementById('totalCash').innerText = irqPrice(localData.totalCashReceived);
            document.getElementById('totalDebts').innerText = irqPrice(totalD);
        }

        function saveProduct() {
            const owner = document.getElementById('p_owner').value;
            const fInput = document.getElementById('p_flavors').value;
            const fArray = fInput.split(',').map(f => f.trim()).filter(f => f !== "");

            if(!fArray.length) return alert("اكتب نكهة واحدة على الأقل!");

            const item = {
                name: document.getElementById('p_name').value,
                cost: Number(document.getElementById('p_cost').value),
                sell: Number(document.getElementById('p_sell').value),
                flavors: fArray
            };

            if(!item.name || !item.sell) return alert("اكمل البيانات الأساسية!");
            
            localData[owner].push(item);
            document.getElementById('p_name').value = "";
            document.getElementById('p_flavors').value = "";
            saveData();
            alert("تم الحفظ بنجاح ✅");
        }

        function sellFlow(owner, idx) {
            const p = localData[owner][idx];
            if(!p.flavors.length) return alert("لا توجد نكهات متوفرة!");

            // اختيار النكهة
            let msg = "اختر رقم النكهة المباعة:\n";
            p.flavors.forEach((f, i) => msg += `${i + 1} - ${f}\n`);
            const choice = prompt(msg);
            const fIdx = parseInt(choice) - 1;

            if(isNaN(fIdx) || !p.flavors[fIdx]) return alert("اختيار خاطئ!");
            const selectedFlavor = p.flavors[fIdx];

            // تحديد المشتري
            const buyer = prompt("للبيع نقداً اكتب (1) \n للبيع بالدين اكتب (اسم الشخص):");
            if(!buyer) return;

            // تنفيذ الحذف
            p.flavors.splice(fIdx, 1);

            if(buyer === "1") {
                localData.salesProfit += (p.sell - p.cost);
                localData.totalCashReceived += p.sell;
                alert(`تم بيع نكهة (${selectedFlavor}) نقداً ✅`);
            } else {
                localData.debts.push({
                    name: buyer,
                    amount: p.sell,
                    itemDetails: `الجهاز: ${p.name} | النكهة: ${selectedFlavor} | التاريخ: ${new Date().toLocaleDateString('ar-IQ')}`
                });
                alert(`تم تسجيل (${p.name} - ${selectedFlavor}) دين على ${buyer}`);
            }
            saveData();
        }

        function payDebt(idx) {
            const val = prompt("المبلغ المستلم كاش:");
            if(val && !isNaN(val)) {
                const amt = Number(val);
                localData.totalCashReceived += amt;
                // ملاحظة: الأرباح الصافية تم حسابها مسبقاً عند تسجيل الدين لتبسيط العملية
                // هنا نقوم فقط بتقليل المديونية وزيادة الكاش الفعلي
                localData.debts[idx].amount -= amt;
                saveData();
                alert("تم تحديث الكاش بنجاح ✅");
            }
        }

        function deleteProduct(owner, idx) { if(confirm("حذف المنتج نهائياً؟")) { localData[owner].splice(idx, 1); saveData(); } }
        function deleteDebt(idx) { if(confirm("مسح السجل؟")) { localData.debts.splice(idx, 1); saveData(); } }

        // تشغيل الرندر الأولي
        renderAll();
    </script>
</body>
</html>
