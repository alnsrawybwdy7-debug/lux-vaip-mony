<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX_VAIP | نظام الأرباح المتطور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; padding: 15px; }
        .card { background: white; border-radius: 1.2rem; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .stat-box { @apply p-4 rounded-xl text-center shadow-sm border; }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 12px; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="stat-box bg-green-50 border-green-200">
            <p class="text-green-600 text-xs font-bold">أرباح المبيعات (كاش)</p>
            <h2 id="soldProfit" class="text-xl font-black text-green-700">0</h2>
        </div>
        <div class="stat-box bg-rose-50 border-rose-200">
            <p class="text-rose-600 text-xs font-bold">إجمالي الديون</p>
            <h2 id="totalDebts" class="text-xl font-black text-rose-700">0</h2>
        </div>
    </div>

    <div class="card border-r-4 border-rose-500">
        <h3 class="font-black mb-4 text-rose-600"><i class="fas fa-hand-holding-usd ml-1"></i> قائمة المديونين</h3>
        <div id="debtList" class="space-y-3"></div>
    </div>

    <div class="card">
        <h3 class="font-black mb-4 text-slate-500 italic">المخزن والبيع</h3>
        <div id="inventoryList" class="space-y-4"></div>
    </div>

    <script>
        // التخزين المحلي
        let localData = JSON.parse(localStorage.getItem('lux_pro_test')) || {
            mustafa: [], hussouni: [], debts: [], salesProfit: 0
        };

        function saveData() {
            localStorage.setItem('lux_pro_test', JSON.stringify(localData));
            render();
        }

        // دالة تنزيل الدين وتحويله لأرباح
        function payDebt(idx) {
            const currentAmount = localData.debts[idx].amount;
            const val = prompt(`المبلغ الحالي: ${currentAmount.toLocaleString()} \n ادخل المبلغ الذي تم استلامه كاش:`);
            
            if (val && !isNaN(val)) {
                const received = Number(val);
                
                // 1. تحديث الأرباح (تحويل الدين المقبوض إلى أرباح كاش)
                localData.salesProfit += received;
                
                // 2. خصم من سجل الدين
                localData.debts[idx].amount -= received;
                
                // إذا تسدد الدين بالكامل نحذفه
                if(localData.debts[idx].amount <= 0) {
                    alert("تم تسديد الدين بالكامل وإضافته للأرباح ✅");
                    localData.debts.splice(idx, 1);
                } else {
                    alert(`تم استلام ${received.toLocaleString()} وإضافتها للأرباح. المتبقي: ${localData.debts[idx].amount.toLocaleString()}`);
                }
                
                saveData();
            }
        }

        // البيع (نقدي أو دين)
        function sellFlow(owner, idx) {
            const p = localData[owner][idx];
            if(p.qty <= 0) return alert("المخزن فارغ!");

            const choice = prompt("للبيع نقداً اكتب (1) \n للبيع بالدين اكتب (اسم الشخص):");
            if (!choice) return;

            if (choice === "1") {
                p.qty -= 1;
                localData.salesProfit += (p.sell - p.cost); // ربح البيع النقدي
                alert("تم البيع نقداً ✅");
            } else {
                p.qty -= 1;
                localData.debts.push({ name: choice, amount: p.sell });
                alert(`تم تسجيل دين بمبلغ ${p.sell} على ${choice}`);
            }
            saveData();
        }

        function render() {
            // تحديث العدادات
            document.getElementById('soldProfit').innerText = localData.salesProfit.toLocaleString() + " د.ع";
            
            let totalD = 0;
            const dDiv = document.getElementById('debtList');
            dDiv.innerHTML = '';
            localData.debts.forEach((d, idx) => {
                totalD += d.amount;
                dDiv.innerHTML += `
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border border-slate-100">
                        <div><b class="text-slate-700">${d.name}</b><br><span class="text-rose-600 font-black text-sm">${d.amount.toLocaleString()} د.ع</span></div>
                        <button onclick="payDebt(${idx})" class="bg-indigo-600 text-white px-4 py-1 rounded-lg text-xs font-bold shadow-sm">تحصيل مبلغ</button>
                    </div>`;
            });
            document.getElementById('totalDebts').innerText = totalD.toLocaleString() + " د.ع";

            // رندر المخزن (تبسيط للعرض)
            const iDiv = document.getElementById('inventoryList');
            iDiv.innerHTML = '';
            ['mustafa', 'hussouni'].forEach(owner => {
                localData[owner].forEach((p, idx) => {
                    iDiv.innerHTML += `
                        <div class="flex justify-between items-center border-b pb-2">
                            <div><b>${p.name}</b> <small class="text-indigo-500">(${owner})</small></div>
                            <div class="flex items-center gap-4">
                                <span class="font-bold">${p.qty} ق</span>
                                <button onclick="sellFlow('${owner}', ${idx})" class="bg-green-500 text-white px-4 py-1 rounded-md text-xs">بيع</button>
                            </div>
                        </div>`;
                });
            });
        }

        // أضفت بضاعة وهمية للتجربة إذا كان فارغاً
        if(localData.mustafa.length === 0 && localData.hussouni.length === 0) {
            localData.mustafa.push({name: "فيب سحبة", cost: 10000, sell: 15000, qty: 5});
            saveData();
        }

        render();
    </script>
</body>
</html>
