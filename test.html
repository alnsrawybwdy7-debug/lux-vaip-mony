<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجربة LUX_VAIP | نظام محلي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .stat-card { background: white; border-radius: 1rem; padding: 15px; border-right: 5px solid #6366f1; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .debt-card { border-right-color: #e11d48; background: #fff1f2; }
        input, select, textarea { border: 1px solid #cbd5e1; border-radius: 0.75rem; padding: 10px; font-size: 14px; width: 100%; outline-color: #6366f1; background: white; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { background: white; padding: 12px; border-top: 1px solid #eee; border-bottom: 1px solid #eee; text-align: right; }
        .edit-badge { background: #e0e7ff; color: #4338ca; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; display: inline-block; margin-top: 4px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="mainSection">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black italic">تجربة إدارة <span class="text-indigo-600">LUX_VAIP</span> (OFFLINE)</h1>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="stat-card"> <p class="text-gray-400 text-[10px] font-bold">أرباح المبيعات</p> <h2 id="soldProfit" class="text-xl font-black text-green-600">0</h2> </div>
            <div class="stat-card debt-card"> <p class="text-rose-600 text-[10px] font-bold">إجمالي الديون</p> <h2 id="totalDebts" class="text-xl font-black text-rose-600">0</h2> </div>
            <div class="stat-card"> <p class="text-gray-400 text-[10px] font-bold">قطع المخزن</p> <h2 id="totalQty" class="text-xl font-black">0</h2> </div>
            <div class="stat-card"> <p class="text-gray-400 text-[10px] font-bold">أرباح المخزن</p> <h2 id="totalProfit" class="text-xl font-black text-amber-600">0</h2> </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-10 border border-rose-100">
            <h3 class="font-black mb-4 text-rose-600"><i class="fas fa-user-minus ml-1"></i> تسجيل دين جديد (تجريبي)</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <input type="text" id="debt_name" placeholder="اسم الشخص">
                <input type="number" id="debt_amount" placeholder="المبلغ">
                <button onclick="addDebt()" class="bg-rose-600 text-white font-black rounded-xl py-2">إضافة للدين</button>
            </div>
            <div class="mt-6 overflow-x-auto">
                <table class="min-w-full">
                    <tbody id="debtTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-10 border border-slate-200">
            <h3 class="font-black mb-4 text-indigo-600 italic"><i class="fas fa-box-open ml-1"></i> إضافة بضاعة (تجريبي)</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-3">
                <input type="text" id="p_name" placeholder="اسم المنتج">
                <input type="number" id="p_cost" placeholder="سعر الكلفة">
                <input type="number" id="p_sell" placeholder="سعر البيع">
                <input type="number" id="p_qty" placeholder="الكمية">
                <select id="p_owner"><option value="mustafa">مخزن مصطفى</option><option value="hussouni">مخزن حسوني</option></select>
                <textarea id="p_desc" class="md:col-span-3 lg:col-span-6" placeholder="اكتب وصف المنتج..."></textarea>
                <button onclick="saveProduct()" class="bg-indigo-600 text-white font-black rounded-xl py-3 md:col-span-6 mt-2">إضافة للمتجر المؤقت</button>
            </div>
        </div>

        <div class="overflow-x-auto bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <h3 class="font-black mb-4 italic text-slate-500">المخزن التجريبي</h3>
            <table class="min-w-full text-sm">
                <thead>
                    <tr class="text-xs text-slate-400 uppercase">
                        <th>المنتج</th> <th>المخزن</th> <th>الكمية</th> <th>السعر</th> <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="pTableBody"></tbody>
            </table>
        </div>
        
        <button onclick="clearAllData()" class="mt-10 text-red-500 text-xs underline w-full text-center">مسح كل بيانات التجربة والبدء من جديد</button>
    </div>

    <script>
        // نظام التخزين المحلي (LocalStorage) بدلاً من Firebase
        let localData = JSON.parse(localStorage.getItem('luxTestStore')) || {
            mustafa: { products: [] },
            hussouni: { products: [] },
            debts: [],
            salesProfit: 0
        };

        function saveData() {
            localStorage.setItem('luxTestStore', JSON.stringify(localData));
            renderAll();
        }

        function renderAll() {
            const tbody = document.getElementById('pTableBody');
            tbody.innerHTML = '';
            let tQty = 0, tProfit = 0;

            ['mustafa', 'hussouni'].forEach(owner => {
                localData[owner].products.forEach((p, idx) => {
                    tQty += Number(p.qty);
                    tProfit += (p.sell - p.cost) * p.qty;
                    tbody.innerHTML += `
                        <tr>
                            <td><b>${p.name}</b><br><span class="text-[10px] text-gray-400">${p.desc || ''}</span><br><span onclick="editField('${owner}', ${idx}, 'desc', '${p.desc}')" class="edit-badge">تعديل الوصف</span></td>
                            <td class="text-[10px] font-bold text-indigo-500 uppercase">${owner}</td>
                            <td class="text-center">${p.qty}<br><span onclick="editField('${owner}', ${idx}, 'qty', ${p.qty})" class="edit-badge">تعديل</span></td>
                            <td>${Number(p.sell).toLocaleString()}<br><span onclick="editField('${owner}', ${idx}, 'sell', ${p.sell})" class="edit-badge">تعديل</span></td>
                            <td><button onclick="sellPiece('${owner}', ${idx})" class="bg-green-500 text-white px-3 py-1 rounded-lg text-xs font-bold">بيع قطعة</button></td>
                        </tr>`;
                });
            });

            const dtbody = document.getElementById('debtTableBody');
            dtbody.innerHTML = '';
            let totalDebts = 0;
            localData.debts.forEach((d, idx) => {
                totalDebts += Number(d.amount);
                dtbody.innerHTML += `
                    <tr>
                        <td class="font-bold">${d.name}</td>
                        <td class="font-black text-rose-600 text-center">${Number(d.amount).toLocaleString()} د.ع</td>
                        <td class="text-left">
                            <button onclick="updateDebt(${idx})" class="bg-rose-100 text-rose-700 px-3 py-1 rounded-lg text-xs font-bold">تنزيل مبلغ</button>
                            <button onclick="deleteDebt(${idx})" class="text-gray-300 mr-2"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });

            document.getElementById('totalQty').innerText = tQty;
            document.getElementById('totalProfit').innerText = tProfit.toLocaleString() + " د.ع";
            document.getElementById('soldProfit').innerText = localData.salesProfit.toLocaleString() + " د.ع";
            document.getElementById('totalDebts').innerText = totalDebts.toLocaleString() + " د.ع";
        }

        function saveProduct() {
            const owner = document.getElementById('p_owner').value;
            const item = {
                name: document.getElementById('p_name').value,
                desc: document.getElementById('p_desc').value,
                cost: Number(document.getElementById('p_cost').value),
                sell: Number(document.getElementById('p_sell').value),
                qty: Number(document.getElementById('p_qty').value)
            };
            if(!item.name || !item.sell) return alert("اكمل البيانات");
            localData[owner].products.push(item);
            saveData();
            alert("تم الحفظ محلياً!");
        }

        function addDebt() {
            const name = document.getElementById('debt_name').value;
            const amount = Number(document.getElementById('debt_amount').value);
            if(name && amount) {
                localData.debts.push({ name, amount });
                saveData();
            }
        }

        function updateDebt(idx) {
            const val = prompt("كم المبلغ المراد تنزيله؟");
            if(val) {
                localData.debts[idx].amount -= Number(val);
                if(localData.debts[idx].amount <= 0) localData.debts.splice(idx, 1);
                saveData();
            }
        }

        function editField(owner, idx, field, current) {
            const val = prompt("القيمة الجديدة:", current);
            if(val !== null) {
                localData[owner].products[idx][field] = (field === 'desc' ? val : Number(val));
                saveData();
            }
        }

        function sellPiece(owner, idx) {
            if(localData[owner].products[idx].qty > 0) {
                let profit = localData[owner].products[idx].sell - localData[owner].products[idx].cost;
                localData[owner].products[idx].qty -= 1;
                localData.salesProfit += profit;
                saveData();
            }
        }

        function deleteDebt(idx) { if(confirm("حذف؟")) { localData.debts.splice(idx, 1); saveData(); } }
        function clearAllData() { if(confirm("هل أنت متأكد من مسح كل بيانات التجربة؟")) { localStorage.removeItem('luxTestStore'); location.reload(); } }

        renderAll();
    </script>
</body>
</html>
