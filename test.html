<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX_VAIP | نظام إدارة النكهات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .stat-card { background: white; border-radius: 1rem; padding: 12px; border-right: 5px solid #6366f1; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 10px; width: 100%; outline-color: #6366f1; font-size: 14px; }
        .flavor-badge { background: #e0e7ff; color: #4338ca; padding: 2px 6px; border-radius: 5px; font-size: 10px; margin: 2px; display: inline-block; }
        .debt-detail { color: #64748b; font-size: 11px; margin-top: 4px; display: block; border-right: 2px solid #e11d48; padding-right: 5px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="mainSection">
        <h1 class="text-2xl font-black text-center mb-8 italic text-indigo-600">LUX_VAIP FLAVORS SYSTEM</h1>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="stat-card border-green-500"> <p class="text-gray-400 text-[10px] font-bold">الكاش الكلي</p> <h2 id="totalCash" class="font-black text-green-600">0</h2> </div>
            <div class="stat-card border-indigo-500"> <p class="text-gray-400 text-[10px] font-bold">صافي الأرباح</p> <h2 id="soldProfit" class="font-black text-indigo-600">0</h2> </div>
            <div class="stat-card border-rose-500"> <p class="text-gray-400 text-[10px] font-bold">إجمالي الديون</p> <h2 id="totalDebts" class="font-black text-rose-600">0</h2> </div>
            <div class="stat-card border-amber-500"> <p class="text-gray-400 text-[10px] font-bold">قطع المخزن</p> <h2 id="totalQty" class="font-black text-amber-600">0</h2> </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 border border-rose-100">
            <h3 class="font-black mb-4 text-rose-600"><i class="fas fa-users-cog ml-1"></i> مديونيات العملاء</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-sm">
                    <tbody id="debtTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 border border-slate-200">
            <h3 class="font-black mb-4 text-indigo-600 italic"><i class="fas fa-plus-circle ml-1"></i> توريد بضاعة جديدة</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
                <input type="text" id="p_name" placeholder="اسم الجهاز (مثلاً: سحبة Vuse)">
                <input type="number" id="p_cost" placeholder="سعر الكلفة">
                <input type="number" id="p_sell" placeholder="سعر البيع">
                <select id="p_owner"><option value="mustafa">مخزن مصطفى</option><option value="hussouni">مخزن حسوني</option></select>
                <input type="text" id="p_flavors" class="md:col-span-2" placeholder="النكهات (افصل بينها بفاصلة , مثلاً: علكة, رقي, نعناع)">
            </div>
            <button onclick="saveProduct()" class="w-full bg-indigo-600 text-white font-black py-3 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition">حفظ المنتج والنكهات</button>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <h3 class="font-black mb-4 text-slate-500 underline italic text-sm">المخزن الحالي</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-sm">
                    <thead>
                        <tr class="text-slate-400 text-[10px] uppercase">
                            <th class="pb-2">المنتج والنكهات المتوفرة</th> <th>المخزن</th> <th>السعر</th> <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="pTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let localData = JSON.parse(localStorage.getItem('lux_v8_flavors')) || {
            mustafa: [], hussouni: [], debts: [], salesProfit: 0, totalCashReceived: 0
        };

        const irqPrice = (num) => new Intl.NumberFormat('ar-IQ').format(num) + " د.ع";

        function saveData() {
            localStorage.setItem('lux_v8_flavors', JSON.stringify(localData));
            renderAll();
        }

        function renderAll() {
            const tbody = document.getElementById('pTableBody');
            tbody.innerHTML = '';
            let tQty = 0;

            ['mustafa', 'hussouni'].forEach(owner => {
                localData[owner].forEach((p, idx) => {
                    tQty += p.flavors.length;
                    let flavorBadges = p.flavors.map(f => `<span class="flavor-badge">${f}</span>`).join('');
                    tbody.innerHTML += `
                        <tr class="border-t">
                            <td class="py-4">
                                <div class="font-black text-slate-800">${p.name}</div>
                                <div class="mt-1">${flavorBadges || '<span class="text-red-400 text-[10px]">نفذت النكهات</span>'}</div>
                            </td>
                            <td class="text-xs font-bold text-indigo-500">${owner}</td>
                            <td class="font-bold text-green-600">${irqPrice(p.sell)}</td>
                            <td>
                                <div class="flex gap-2">
                                    <button onclick="sellFlow('${owner}', ${idx})" class="bg-green-500 text-white px-4 py-1 rounded-lg text-xs font-bold shadow-sm">بيع</button>
                                    <button onclick="deleteProduct('${owner}', ${idx})" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                                </div>
                            </td>
                        </tr>`;
                });
            });

            const dtbody = document.getElementById('debtTableBody');
            dtbody.innerHTML = '';
            let totalD = 0;
            localData.debts.forEach((d, idx) => {
                const isPaid = d.amount <= 0;
                if(!isPaid) totalD += d.amount;
                dtbody.innerHTML += `
                    <tr class="border-t">
                        <td class="py-3">
                            <div class="font-black text-slate-800">${d.name}</div>
                            <span class="debt-detail italic">${d.itemDetails || 'تسجيل يدوي'}</span>
                        </td>
                        <td class="font-black ${isPaid ? 'text-green-600' : 'text-rose-600'} text-center">
                            ${isPaid ? 'تم التسديد ✅' : irqPrice(d.amount)}
                        </td>
                        <td class="text-left">
                            ${!isPaid ? `<button onclick="payDebt(${idx})" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg text-[10px] font-bold border border-indigo-100">تحصيل</button>` : ''}
                            <button onclick="deleteDebt(${idx})" class="text-slate-200 mr-2"><i class="fas fa-times-circle"></i></button>
                        </td>
                    </tr>`;
            });

            document.getElementById('totalQty').innerText = tQty;
            document.getElementById('soldProfit').innerText = irqPrice(localData.salesProfit);
            document.getElementById('totalCash').innerText = irqPrice(localData.totalCashReceived);
            document.getElementById('totalDebts').innerText = irqPrice(totalD);
        }

        function saveProduct() {
            const owner = document.getElementById('p_owner').value;
            const flavorInput = document.getElementById('p_flavors').value;
            // تحويل النص إلى قائمة نكهات
            const flavorArray = flavorInput.split(',').map(f => f.trim()).filter(f => f !== "");

            if(flavorArray.length === 0) return alert("الرجاء كتابة نكهة واحدة على الأقل!");

            const item = {
                name: document.getElementById('p_name').value,
                cost: Number(document.getElementById('p_cost').value),
                sell: Number(document.getElementById('p_sell').value),
                flavors: flavorArray
            };

            if(!item.name || !item.sell) return alert("اكمل بيانات السعر والاسم!");
            
            localData[owner].push(item);
            document.getElementById('p_flavors').value = "";
            document.getElementById('p_name').value = "";
            saveData();
            alert("تمت إضافة المنتج بـ " + flavorArray.length + " نكهات ✅");
        }

        function sellFlow(owner, idx) {
            const p = localData[owner][idx];
            if(p.flavors.length === 0) return alert("عذراً، هذا المنتج نفذت جميع نكهاته!");

            // 1. اختيار النكهة
            let msg = "اختار رقم النكهة المباعة:\n";
            p.flavors.forEach((f, i) => msg += `${i + 1} - ${f}\n`);
            const fChoice = prompt(msg);
            const fIdx = parseInt(fChoice) - 1;

            if(isNaN(fIdx) || !p.flavors[fIdx]) return alert("اختيار غير صحيح!");
            const selectedFlavor = p.flavors[fIdx];

            // 2. نوع البيع
            const saleType = prompt("للببيع النقدي اكتب (1) \n للبيع بالدين اكتب (اسم الشخص):");
            if(!saleType) return;

            // تنفيذ الحذف من المخزن
            p.flavors.splice(fIdx, 1);

            if(saleType === "1") {
                localData.salesProfit += (p.sell - p.cost);
                localData.totalCashReceived += p.sell;
                alert(`تم بيع نكهة (${selectedFlavor}) نقداً ✅`);
            } else {
                localData.debts.push({
                    name: saleType,
                    amount: p.sell,
                    itemDetails: `المنتج: ${p.name} | النكهة: ${selectedFlavor}`
                });
                alert(`تم تسجيل (${selectedFlavor}) دين على ${saleType}`);
            }
            saveData();
        }

        function payDebt(idx) {
            const val = prompt("المبلغ المستلم كاش:");
            if(val && !isNaN(val)) {
                const amount = Number(val);
                localData.totalCashReceived += amount;
                localData.debts[idx].amount -= amount;
                saveData();
            }
        }

        function deleteProduct(owner, idx) { if(confirm("حذف؟")) { localData[owner].splice(idx, 1); saveData(); } }
        function deleteDebt(idx) { if(confirm("مسح؟")) { localData.debts.splice(idx, 1); saveData(); } }

        renderAll();
    </script>
</body>
</html>
