<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة Lux Vape</title>
    <style>
        :root { --primary: #ff9800; --dark: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 10px; }
        .nav-bar { display: flex; justify-content: space-around; background: var(--card); padding: 10px; border-radius: 10px; margin-bottom: 20px; position: sticky; top: 0; z-index: 100; }
        .nav-item { cursor: pointer; padding: 8px 15px; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .nav-item.active { background: var(--primary); color: #000; }
        
        .section { display: none; }
        .section.active { display: block; }

        .card { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 15px; border-right: 5px solid var(--primary); }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; background: #333; color: #fff; box-sizing: border-box; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-add { background: #4caf50; color: white; }
        .btn-pay { background: #2196f3; color: white; margin-top: 5px; }
        .btn-del { background: #f44336; color: white; padding: 5px; width: auto; }

        .debt-item { display: flex; justify-content: space-between; align-items: center; background: #252525; padding: 10px; margin-top: 5px; border-radius: 5px; }
        .balance-tag { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showSection('home')">الرئيسية</div>
        <div class="nav-item" onclick="showSection('hassouni')">حسوني</div>
        <div class="nav-item" onclick="showSection('mustafa')">مصطفى</div>
        <div class="nav-item" onclick="showSection('debts')">الديون</div>
    </div>

    <div id="home" class="section active">
        <div class="card">
            <h3>إضافة منتج جديد</h3>
            <input type="text" id="pName" placeholder="اسم المنتج">
            <input type="number" id="pPrice" placeholder="سعر البيع">
            <input type="number" id="pProfit" placeholder="الربح الصافي">
            <select id="pOwner">
                <option value="hassouni">تابع لحسوني</option>
                <option value="mustafa">تابع لمصطفى</option>
            </select>
            <textarea id="pDesc" placeholder="وصف المنتج"></textarea>
            <button class="btn-add" onclick="addProduct()">إضافة للمخزن</button>
        </div>
    </div>

    <div id="hassouni" class="section">
        <h2>منتجات حسوني</h2>
        <div id="hassouniList"></div>
    </div>

    <div id="mustafa" class="section">
        <h2>منتجات مصطفى</h2>
        <div id="mustafaList"></div>
    </div>

    <div id="debts" class="section">
        <div class="card">
            <h3>إضافة دين جديد</h3>
            <input type="text" id="debtorName" placeholder="اسم الشخص">
            <input type="number" id="debtAmount" placeholder="المبلغ">
            <button class="btn-add" onclick="addDebt()">تسجيل الدين</button>
        </div>
        <h3>سجل المديونين</h3>
        <div id="debtsList"></div>
    </div>

<script>
    let data = JSON.parse(localStorage.getItem('luxData')) || {
        products: [],
        debts: []
    };

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        renderData();
    }

    function addProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const profit = document.getElementById('pProfit').value;
        const owner = document.getElementById('pOwner').value;
        const desc = document.getElementById('pDesc').value;

        if(!name || !price) return alert("امسح الحقول الفارغة!");

        data.products.push({ id: Date.now(), name, price, profit, owner, desc });
        saveAndRefresh();
        alert("تمت الإضافة!");
    }

    function addDebt() {
        const name = document.getElementById('debtorName').value;
        const amount = parseFloat(document.getElementById('debtAmount').value);
        if(!name || !amount) return alert("اكمل البيانات");

        data.debts.push({ id: Date.now(), name, amount });
        saveAndRefresh();
    }

    function payDebt(id) {
        const amount = parseFloat(prompt("كم المبلغ الذي تريد تنزيله؟"));
        if(isNaN(amount)) return;
        
        const debt = data.debts.find(d => d.id === id);
        if(debt) {
            debt.amount -= amount;
            if(debt.amount <= 0) data.debts = data.debts.filter(d => d.id !== id);
            saveAndRefresh();
        }
    }

    function renderData() {
        // رندر منتجات حسوني
        const hList = document.getElementById('hassouniList');
        hList.innerHTML = data.products.filter(p => p.owner === 'hassouni').map(p => `
            <div class="card">
                <h4>${p.name} <span style="float:left">${p.price} د.ع</span></h4>
                <p>${p.desc}</p>
                <small>الربح المتوقع: ${p.profit}</small>
            </div>
        `).join('');

        // رندر منتجات مصطفى
        const mList = document.getElementById('mustafaList');
        mList.innerHTML = data.products.filter(p => p.owner === 'mustafa').map(p => `
            <div class="card">
                <h4>${p.name} <span style="float:left">${p.price} د.ع</span></h4>
                <p>${p.desc}</p>
                <small>الربح المتوقع: ${p.profit}</small>
            </div>
        `).join('');

        // رندر الديون
        const dList = document.getElementById('debtsList');
        dList.innerHTML = data.debts.map(d => `
            <div class="debt-item">
                <div>
                    <b>${d.name}</b> <br>
                    <span class="balance-tag">${d.amount.toLocaleString()} د.ع</span>
                </div>
                <button class="btn-pay" onclick="payDebt(${d.id})">تنزيل مبلغ</button>
            </div>
        `).join('');
    }

    function saveAndRefresh() {
        localStorage.setItem('luxData', JSON.stringify(data));
        renderData();
    }

    renderData();
</script>
</body>
</html>
