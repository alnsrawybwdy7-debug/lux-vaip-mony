<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>متجر lux_vaip - تشكيلة حسوني ومصطفى</title>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

            body {
                font-family: 'Tajawal', sans-serif;
                background: #0f172a;
                color: white;
            }

            .product-card {
                background: #1e293b;
                border: 1px solid #334155;
                transition: 0.4s;
                position: relative;
                overflow: hidden;
            }

            .out-of-stock {
                opacity: 0.5;
                filter: grayscale(1);
            }

            .stock-badge {
                position: absolute;
                top: 15px;
                right: 15px;
                background: #ef4444;
                color: white;
                padding: 4px 15px;
                border-radius: 50px;
                font-size: 11px;
                font-weight: bold;
                z-index: 20;
            }

            .store-tag {
                position: absolute;
                top: 15px;
                left: 15px;
                background: rgba(99, 102, 241, 0.8);
                color: white;
                padding: 2px 10px;
                border-radius: 8px;
                font-size: 10px;
                z-index: 20;
            }

            .whatsapp-btn {
                background: linear-gradient(45deg, #25d366, #128c7e);
            }
        </style>
    </head>

    <body class="pb-12 text-center">

        <header class="p-8 border-b border-slate-800 bg-slate-900/80 sticky top-0 z-50">
            <h1 class="text-4xl font-black text-white italic">LUX<span class="text-indigo-500">_</span>VAIP</h1>
            <p class="text-gray-400 text-sm mt-2 italic">أكبر تشكيلة في الديوانية - حسوني & مصطفى 🔥</p>
        </header>

        <main class="container mx-auto px-4 mt-10">
            <div id="customer-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 text-center">
                <p class="col-span-full text-gray-500 italic py-20 text-xl flex flex-col items-center">
                    <i class="fas fa-spinner animate-spin mb-4"></i>
                    جاري دمج بضاعة المخازن...
                </p>
            </div>
        </main>

        <script>
            const firebaseConfig = {
                apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc",
                authDomain: "lux-vaip.firebaseapp.com",
                projectId: "lux-vaip",
                storageBucket: "lux-vaip.firebasestorage.app",
                messagingSenderId: "958955103630",
                appId: "1:958955103630:web:1d3f7f94466021d57b70df",
                measurementId: "G-NET3PPRG11",
                databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/"
            };

            firebase.initializeApp(firebaseConfig);
            const rtdb = firebase.database();

            // جلب البيانات من القسمين ودمجهم
            rtdb.ref('luxVaipData').on('value', (snapshot) => {
                const grid = document.getElementById('customer-grid');
                grid.innerHTML = '';

                if (snapshot.exists()) {
                    const allData = snapshot.val();
                    let combinedProducts = [];

                    // إضافة منتجات مصطفى مع تلميح
                    if (allData.mustafa && allData.mustafa.products) {
                        allData.mustafa.products.forEach(p => {
                            combinedProducts.push({ ...p, owner: 'مصطفى' });
                        });
                    }

                    // إضافة منتجات حسوني مع تلميح
                    if (allData.hussouni && allData.hussouni.products) {
                        allData.hussouni.products.forEach(p => {
                            combinedProducts.push({ ...p, owner: 'حسوني' });
                        });
                    }

                    if (combinedProducts.length > 0) {
                        combinedProducts.forEach((p) => {
                            const isAvailable = p.qty > 0;
                            grid.innerHTML += `
                            <div class="product-card rounded-[2.5rem] shadow-2xl ${!isAvailable ? 'out-of-stock' : ''} p-4">${!isAvailable ? '<div class="stock-badge">نفذت الكمية ❌</div>' : ''}
                                <div class="store-tag font-bold italic">مخزن ${p.owner}</div>
                                <img src="${p.img}" class="w-full h-72 object-cover rounded-[2rem]">
                                <div class="p-6">
                                    <h4 class="text-2xl font-bold mb-2 text-white italic underline">${p.name}</h4>
                                    <p class="text-gray-400 text-sm mb-6 h-12 overflow-hidden italic">${p.desc || 'لا يوجد وصف.'}</p>
                                    <div class="flex justify-between items-center">
                                        <div class="bg-indigo-500/10 text-indigo-400 px-4 py-2 rounded-2xl font-black text-xl border border-indigo-500/20">
                                            ${p.sell.toLocaleString()} <span class="text-[10px]">د.ع</span>
                                        </div>
                                        ${isAvailable ?
                                    `<button onclick="sendOrder('${p.name}', '${p.sell}', '${p.owner}')" class="whatsapp-btn text-white px-6 py-3 rounded-2xl font-bold flex items-center gap-2">
                                                <i class="fab fa-whatsapp text-xl"></i> اطلب
                                            </button>` :
                                    <button disabled class="bg-slate-700 text-slate-500 px-6 py-3 rounded-2xl font-bold italic">مباع 📦</button>
                                }
                                    </div>
                                </div>
                            </div>`;
                        });
                    } else {
                        grid.innerHTML = '<div class="col-span-full py-20 text-gray-500 text-xl">المخازن فارغة حالياً!</div>';
                    }
                }
            });

            function sendOrder(name, price, owner) {
                const phone = "9647807483170";
                const message = مرحباً lux_vaip 🌟\nأريد طلب المنتج التالي: \n━━━━━━━━━━━━\n📦 الاسم: ${ name }\n💰 السعر: ${ price } د.ع\n📍 المخزن: ${ owner }\n━━━━━━━━━━━━\nيرجى تأكيد التوافر.;
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
            }
        </script>
    </body>

</html>
