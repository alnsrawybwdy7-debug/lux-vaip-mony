<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>متجر lux_vaip - بحث ذكي</title>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

            body {
                font-family: 'Tajawal', sans-serif;
                background: #0f172a;
                color: white;
            }

            .product-card {
                background: #1e293b;
                border: 1px solid #334155;
                transition: 0.4s;
                position: relative;
                overflow: hidden;
            }

            .out-of-stock {
                opacity: 0.5;
                filter: grayscale(1);
            }

            .stock-badge {
                position: absolute;
                top: 15px;
                right: 15px;
                background: #ef4444;
                color: white;
                padding: 4px 12px;
                border-radius: 50px;
                font-size: 10px;
                font-weight: bold;
                z-index: 20;
            }

            .owner-tag {
                position: absolute;
                top: 15px;
                left: 15px;
                background: rgba(79, 70, 229, 0.9);
                color: white;
                padding: 2px 10px;
                border-radius: 8px;
                font-size: 10px;
                z-index: 20;
                font-weight: bold;
            }

            .search-input:focus {
                box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
            }
        </style>
    </head>

    <body class="pb-12 text-center">

        <header class="p-6 border-b border-slate-800 bg-slate-900/90 sticky top-0 z-50 backdrop-blur-md">
            <h1 class="text-3xl font-black text-white italic tracking-tighter mb-4">LUX<span
                    class="text-indigo-500">_</span>VAIP</h1>

            <div class="max-w-md mx-auto relative">
                <input type="text" id="search-box" oninput="filterProducts()" placeholder="ابحث عن نكهة أو جهاز..."
                    class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-3 px-12 text-sm outline-none focus:border-indigo-500 transition-all search-input text-white">
                <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
            </div>
        </header>

        <main class="container mx-auto px-4 mt-8">
            <div id="customer-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <p class="col-span-full py-20 text-gray-500 italic">جاري تحميل المنتجات...</p>
            </div>
        </main>

        <script>
            const firebaseConfig = {
                apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc",
                authDomain: "lux-vaip.firebaseapp.com",
                projectId: "lux-vaip",
                storageBucket: "lux-vaip.firebasestorage.app",
                messagingSenderId: "958955103630",
                appId: "1:958955103630:web:1d3f7f94466021d57b70df",
                measurementId: "G-NET3PPRG11",
                databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/"
            };

            firebase.initializeApp(firebaseConfig);
            const rtdb = firebase.database();
            let allProducts = []; // مصفوفة لتخزين كل المنتجات للبحث فيها

            rtdb.ref('luxVaipData').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    allProducts = [];

                    if (data.mustafa && data.mustafa.products) {
                        data.mustafa.products.forEach(p => allProducts.push({ ...p, owner: 'مصطفى' }));
                    }
                    if (data.hussouni && data.hussouni.products) {
                        data.hussouni.products.forEach(p => allProducts.push({ ...p, owner: 'حسوني' }));
                    }

                    renderProducts(allProducts);
                }
            });

            function renderProducts(productsList) {
                const grid = document.getElementById('customer-grid');
                grid.innerHTML = '';

                if (productsList.length === 0) {
                    grid.innerHTML = '<p class="col-span-full py-20 text-gray-500 italic">لا توجد نتائج تطابق بحثك 🔍</p>';
                    return;
                }
                productsList.forEach((p) => {
                    const isAvailable = p.qty > 0;
                    grid.innerHTML += `
                    <div class="product-card rounded-[2rem] shadow-2xl ${!isAvailable ? 'out-of-stock' : ''} p-4">
                        ${!isAvailable ? '<div class="stock-badge">نفذت ❌</div>' : ''}
                        <div class="owner-tag italic text-[9px]">مخزن ${p.owner}</div>
                        <img src="${p.img}" class="w-full h-64 object-cover rounded-2xl">
                        <div class="p-6">
                            <h4 class="text-xl font-bold mb-2 text-white italic underline">${p.name}</h4>
                            <div class="flex justify-between items-center mt-6">
                                <span class="text-indigo-400 font-black text-lg">${p.sell.toLocaleString()} <span class="text-[10px]">د.ع</span></span>
                                ${isAvailable ?
                            <button onclick="sendOrder('${p.name}', '${p.sell}', '${p.owner}')" class="bg-green-600 hover:bg-green-500 text-white px-5 py-2 rounded-xl font-bold text-sm transition-all">اطلب واتساب</button> :
                            <span class="text-gray-500 font-bold italic">تم البيع 📦</span>
                        }
                            </div>
                        </div>
                    </div>`;
                });
            }

            // وظيفة البحث
            function filterProducts() {
                const searchTerm = document.getElementById('search-box').value.toLowerCase();
                const filtered = allProducts.filter(p =>
                    p.name.toLowerCase().includes(searchTerm) ||
                    (p.desc && p.desc.toLowerCase().includes(searchTerm))
                );
                renderProducts(filtered);
            }

            function sendOrder(name, price, owner) {
                const phone = "9647807483170";
                const message = مرحباً lux_vaip 🌟\nأريد طلب: \n📦 المنتج: ${ name }\n💰 السعر: ${ price }\n📍 من مخزن: ${ owner };
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
            }
        </script>
    </body>

</html>
