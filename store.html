<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LUX_VAIP | متجر الديوانية</title>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;900&display=swap');

            body {
                font-family: 'Tajawal', sans-serif;
                background: #020617;
                color: white;
                margin: 0;
            }

            .glass {
                background: rgba(15, 23, 42, 0.8);
                backdrop-filter: blur(12px);
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }

            .product-card {
                background: rgba(30, 41, 59, 0.4);
                border: 1px solid rgba(255, 255, 255, 0.05);
                transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                border-radius: 2.5rem;
                overflow: hidden;
            }

            .product-card:hover {
                transform: translateY(-10px);
                border-color: #6366f1;
                box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.25);
            }

            .badge {
                position: absolute;
                top: 15px;
                left: 15px;
                background: linear-gradient(45deg, #4f46e5, #9333ea);
                color: white;
                padding: 3px 12px;
                border-radius: 50px;
                font-size: 10px;
                font-weight: bold;
                z-index: 10;
                shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            }
        </style>
    </head>

    <body class="min-h-screen pb-10">

        <header class="sticky top-0 z-50 glass px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-600 rounded-xl shadow-lg shadow-indigo-500/30">
                    <i class="fas fa-wind text-white text-xl"></i>
                </div>
                <h1 class="text-2xl font-black italic tracking-tighter">LUX<span class="text-indigo-500">_</span>VAIP
                </h1>
            </div>

            <div class="relative w-full md:w-96">
                <input type="text" id="searchInput" oninput="searchData()"
                    class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-3 px-12 text-sm outline-none focus:ring-2 ring-indigo-500/50 transition-all"
                    placeholder="ابحث عن نكهة أو سحبة...">
                <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
            </div>
        </header>

        <main class="container mx-auto px-6 py-10">
            <div id="loading" class="flex flex-col items-center justify-center py-20 text-slate-500 italic">
                <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4">
                </div>
                جاري تحميل البضاعة...
            </div>
            <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
        </main>

        <script>
            const firebaseConfig = {
                apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc",
                authDomain: "lux-vaip.firebaseapp.com",
                projectId: "lux-vaip",
                storageBucket: "lux-vaip.firebasestorage.app",
                messagingSenderId: "958955103630",
                appId: "1:958955103630:web:1d3f7f94466021d57b70df",
                measurementId: "G-NET3PPRG11",
                databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/"
            };

            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            let allItems = [];

            db.ref('luxVaipData').on('value', (snap) => {
                const data = snap.val();
                allItems = [];
                document.getElementById('loading').style.display = 'none';
                if (data) {
                    if (data.mustafa && data.mustafa.products) data.mustafa.products.forEach(p => allItems.push({ ...p, from: 'مصطفى' }));
                    if (data.hussouni && data.hussouni.products) data.hussouni.products.forEach(p => allItems.push({ ...p, from: 'حسوني' }));
                    render(allItems);
                }
            });
            function render(list) {
                const container = document.getElementById('grid');
                container.innerHTML = '';
                list.forEach(p => {
                    if (p.qty > 0) {
                        container.innerHTML += `
                        <div class="product-card p-4 relative flex flex-col h-full">
                            <span class="badge italic">مخزن ${p.from}</span>
                            <div class="h-60 rounded-[2rem] overflow-hidden mb-4 bg-slate-800">
                                <img src="${p.img}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300'">
                            </div>
                            <div class="px-2 flex flex-col flex-grow">
                                <h3 class="text-xl font-bold italic mb-2">${p.name}</h3>
                                <div class="mt-auto flex justify-between items-center pb-2">
                                    <span class="text-indigo-400 font-black text-lg">${Number(p.sell).toLocaleString()} <small class="text-[9px]">د.ع</small></span>
                                    <button onclick="orderNow('${p.name}', '${p.sell}', '${p.from}')" 
                                            class="bg-green-600 hover:bg-green-500 text-white px-5 py-2 rounded-2xl text-xs font-bold transition-all shadow-lg shadow-green-600/20">
                                        اطلب <i class="fab fa-whatsapp"></i>
                                    </button>
                                </div>
                            </div>
                        </div>`;
                    }
                });
            }

            function searchData() {
                const val = document.getElementById('searchInput').value.toLowerCase();
                const filtered = allItems.filter(i => i.name.toLowerCase().includes(val));
                render(filtered);
            }

            function orderNow(name, price, owner) {
                const msg = مرحباً LUX_VAIP 💨\nأريد طلب المنتج: ${ name }\nالسعر: ${ price } د.ع\nالمخزن: ${ owner };
                window.open(`https://wa.me/9647807483170?text=${encodeURIComponent(msg)}`);
            }
        </script>
    </body>

</html>
