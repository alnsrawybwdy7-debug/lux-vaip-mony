<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LUX_VAIP | المتجر الرسمي</title>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <style>
            @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;800&display=swap');

            body {
                font-family: 'Tajawal', sans-serif;
                background-color: #050811;
                color: white;
                margin: 0;
                overflow-x: hidden;
            }

            .glass {
                background: rgba(30, 41, 59, 0.7);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }

            .product-card {
                background: #111827;
                border: 1px solid #1f2937;
                transition: all 0.3s ease;
                overflow: hidden;
            }

            .product-card:hover {
                transform: translateY(-5px);
                border-color: #6366f1;
                box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.3);
            }

            .owner-badge {
                position: absolute;
                top: 12px;
                left: 12px;
                background: #6366f1;
                color: white;
                padding: 2px 10px;
                border-radius: 8px;
                font-size: 10px;
                font-weight: bold;
                z-index: 10;
            }

            ::-webkit-scrollbar {
                width: 5px;
            }

            ::-webkit-scrollbar-thumb {
                background: #6366f1;
                border-radius: 10px;
            }
        </style>
    </head>

    <body class="min-h-screen">

        <header class="sticky top-0 z-50 glass border-b border-white/10 px-6 py-4">
            <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-2">
                    <i class="fas fa-wind text-indigo-500 text-2xl"></i>
                    <h1 class="text-2xl font-black italic tracking-tighter">LUX<span
                            class="text-indigo-500">_</span>VAIP</h1>
                </div>
                <div class="relative w-full md:w-96">
                    <input type="text" id="searchInput" oninput="searchData()"
                        class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-2 px-10 text-sm outline-none focus:border-indigo-500 transition-all"
                        placeholder="ابحث عن نكهة أو سحبة...">
                    <i class="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                </div>
            </div>
        </header>

        <main class="container mx-auto px-6 py-10">
            <div id="loading" class="flex flex-col items-center justify-center py-20 text-gray-500">
                <i class="fas fa-spinner animate-spin text-3xl mb-4"></i>
                <p class="italic font-bold">جاري تحميل أحدث المنتجات من المخازن...</p>
            </div>

            <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
        </main>

        <footer class="py-10 text-center text-gray-600 text-xs italic border-t border-white/5 mt-10">
            جميع الحقوق محفوظة لمتجر LUX_VAIP &copy; 2026
        </footer>

        <script>
            // Firebase Configuration
            const firebaseConfig = {
                apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc",
                authDomain: "lux-vaip.firebaseapp.com",
                projectId: "lux-vaip",
                storageBucket: "lux-vaip.firebasestorage.app",
                messagingSenderId: "958955103630",
                appId: "1:958955103630:web:1d3f7f94466021d57b70df",
                measurementId: "G-NET3PPRG11",
                databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/"
            };

            // Initialize Firebase
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            let allProducts = [];

            // Real-time listener for both Mustafa and Hussouni
            db.ref('luxVaipData').on('value', (snapshot) => {
                const data = snapshot.val();
                allProducts = [];
                document.getElementById('loading').style.display = 'none';

                if (data) {// Merge Mustafa's products
                    if (data.mustafa && data.mustafa.products) {
                        data.mustafa.products.forEach(p => allProducts.push({ ...p, owner: 'مصطفى' }));
                    }
                    // Merge Hussouni's products
                    if (data.hussouni && data.hussouni.products) {
                        data.hussouni.products.forEach(p => allProducts.push({ ...p, owner: 'حسوني' }));
                    }
                    render(allProducts);
                } else {
                    document.getElementById('products-grid').innerHTML = '<p class="col-span-full text-center py-20">المخزن فارغ حالياً</p>';
                }
            });

            // Function to display products
            function render(list) {
                const container = document.getElementById('products-grid');
                container.innerHTML = '';

                if (list.length === 0) {
                    container.innerHTML = '<p class="col-span-full text-center py-20">لا توجد نتائج بحث تطابق طلبك</p>';
                    return;
                }

                list.forEach(p => {
                    // Only show available products
                    if (p.qty > 0) {
                        container.innerHTML += `
                        <div class="product-card rounded-[2rem] p-4 flex flex-col relative">
                            <div class="owner-badge italic">مخزن ${p.owner}</div>
                            <img src="${p.img}" class="w-full h-64 object-cover rounded-3xl mb-4" onerror="this.src='https://via.placeholder.com/300x300?text=No+Image'">
                            <h3 class="text-xl font-bold mb-1 px-2 italic">${p.name}</h3>
                            <p class="text-gray-500 text-xs px-2 mb-4 h-8 overflow-hidden line-clamp-2">${p.desc || 'نكهة أصلية ومميزة'}</p>
                            
                            <div class="mt-auto flex justify-between items-center px-2 pb-2">
                                <span class="text-indigo-400 font-black text-lg">${Number(p.sell).toLocaleString()} <small class="text-[10px]">د.ع</small></span>
                                <button onclick="orderNow('${p.name}', '${p.sell}', '${p.owner}')" 
                                        class="bg-green-600 hover:bg-green-500 text-white px-5 py-2 rounded-2xl text-xs font-bold transition-all active:scale-90">
                                    اطلب <i class="fab fa-whatsapp ml-1"></i>
                                </button>
                            </div>
                        </div>`;
                    }
                });
            }

            // Search logic
            function searchData() {
                const query = document.getElementById('searchInput').value.toLowerCase();
                const filtered = allProducts.filter(item => item.name.toLowerCase().includes(query));
                render(filtered);
            }

            // WhatsApp Ordering
            function orderNow(name, price, owner) {
                const phone = "9647807483170";
                const message = مرحباً LUX_VAIP 💨\nأريد طلب المنتج التالي: \n📦 الاسم: ${ name }\n💰 السعر: ${ price } د.ع\n📍 المخزن: ${ owner };
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
            }
        </script>
    </body>

</html>
