<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LUX_VAIP STORE</title>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

            body {
                font-family: 'Tajawal', sans-serif;
                background: #0f172a;
                color: white;
                margin: 0;
            }

            .product-card {
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 20px;
                padding: 15px;
                transition: 0.3s;
            }

            .product-card:hover {
                border-color: #6366f1;
                transform: translateY(-5px);
            }

            .owner-tag {
                background: #6366f1;
                color: white;
                padding: 2px 8px;
                border-radius: 6px;
                font-size: 10px;
                font-weight: bold;
                margin-bottom: 10px;
                display: inline-block;
            }
        </style>
    </head>

    <body class="pb-10 text-center">

        <header class="p-6 bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
            <h1 class="text-2xl font-black italic">LUX<span class="text-indigo-500">_</span>VAIP</h1>
            <input type="text" id="searchBox" oninput="searchNow()" placeholder="ابحث هنا..."
                class="mt-4 w-full max-w-md bg-slate-800 border border-slate-700 rounded-xl py-2 px-4 text-white outline-none">
        </header>

        <main class="container mx-auto px-4 mt-8">
            <div id="loading" class="py-20 text-gray-500">جاري تحميل البضاعة...</div>
            <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </main>

        <script>
            const firebaseConfig = {
                apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc",
                authDomain: "lux-vaip.firebaseapp.com",
                projectId: "lux-vaip",
                storageBucket: "lux-vaip.firebasestorage.app",
                messagingSenderId: "958955103630",
                appId: "1:958955103630:web:1d3f7f94466021d57b70df",
                measurementId: "G-NET3PPRG11",
                databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/"
            };

            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            let allProducts = [];

            db.ref('luxVaipData').on('value', (snap) => {
                const data = snap.val();
                allProducts = [];
                document.getElementById('loading').style.display = 'none';
                if (data) {
                    if (data.mustafa && data.mustafa.products) data.mustafa.products.forEach(p => allProducts.push({ ...p, from: 'مصطفى' }));
                    if (data.hussouni && data.hussouni.products) data.hussouni.products.forEach(p => allProducts.push({ ...p, from: 'حسوني' }));
                    render(allProducts);
                }
            });

            function render(list) {
                const container = document.getElementById('grid');
                container.innerHTML = '';
                list.forEach(p => {
                    if (p.qty > 0) {
                        container.innerHTML += `
                        <div class="product-card flex flex-col items-center">
                            <span class="owner-tag">مخزن ${p.from}</span>
                            <img src="${p.img}" class="w-full h-52 object-cover rounded-xl mb-4" onerror="this.src='https://via.placeholder.com/300'">
                            <h3 class="font-bold text-lg mb-2">${p.name}</h3>
                            <div class="mt-auto w-full flex justify-between items-center">
                                <span class="text-indigo-400 font-bold">${Number(p.sell).toLocaleString()} د.ع</span>
                                <button onclick="order('${p.name}')" class="bg-green-600 px-4 py-2 rounded-lg text-xs font-bold">اطلب</button>
                            </div>
                        </div>`;
                    }
                });
            }

            function searchNow() {
                const term = document.getElementById('searchBox').value.toLowerCase();
                const filtered = allProducts.filter(i => i.name.toLowerCase().includes(term));
                render(filtered);
            }

            function order(name) {
                window.open(`https://wa.me/9647807483170?text=${encodeURIComponent('أريد طلب المنتج: ' + name)}`);
            }
        </script>
    </body>

</html>
