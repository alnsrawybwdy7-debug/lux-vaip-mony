<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>متجر lux_vaip - اطلب الآن</title>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

            body {
                font-family: 'Tajawal', sans-serif;
                background: #0f172a;
                color: white;
            }

            .product-card {
                background: #1e293b;
                border: 1px solid #334155;
                transition: 0.4s;
                position: relative;
                overflow: hidden;
            }

            .product-card:hover {
                transform: translateY(-8px);
                border-color: #6366f1;
            }

            .out-of-stock {
                opacity: 0.5;
                filter: grayscale(1);
            }

            .stock-badge {
                position: absolute;
                top: 15px;
                right: 15px;
                background: #ef4444;
                color: white;
                padding: 4px 15px;
                border-radius: 50px;
                font-size: 12px;
                font-weight: bold;
                z-index: 20;
            }

            .whatsapp-btn {
                background: linear-gradient(45deg, #25d366, #128c7e);
            }

            .price-tag {
                background: rgba(99, 102, 241, 0.1);
                color: #818cf8;
                border: 1px solid rgba(99, 102, 241, 0.2);
            }
        </style>
    </head>

    <body class="pb-12">

        <header class="p-8 text-center border-b border-slate-800 bg-slate-900/80 backdrop-blur-lg sticky top-0 z-50">
            <div
                class="inline-block px-4 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-[10px] font-bold mb-3 uppercase tracking-widest">
                Premium Vape Store</div>
            <h1 class="text-4xl font-black text-white tracking-tighter uppercase">LUX<span
                    class="text-indigo-500">_</span>VAIP</h1>
            <p class="text-gray-400 text-sm mt-2 italic text-center">الديوانية - توصيل سريع 🔥</p>
        </header>

        <main class="container mx-auto px-4 mt-10">
            <div id="customer-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 text-center">
                <p class="col-span-full text-gray-500 italic">جاري تحميل أحدث المنتجات...</p>
            </div>
        </main>

        <footer class="mt-20 border-t border-slate-800 pt-10 text-center text-gray-500 text-sm">
            <p>جميع الحقوق محفوظة لـ <span class="text-white font-bold italic underline">lux_vaip</span></p>
            <p class="text-[10px] mt-2 italic text-gray-600 font-bold">تطوير وبرمجة أبو نجم 🌟</p>
        </footer>

        <script>
            // إعدادات Firebase الخاصة بك
            const firebaseConfig = {
                apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc",
                authDomain: "lux-vaip.firebaseapp.com",
                projectId: "lux-vaip",
                storageBucket: "lux-vaip.firebasestorage.app",
                messagingSenderId: "958955103630",
                appId: "1:958955103630:web:1d3f7f94466021d57b70df",
                measurementId: "G-NET3PPRG11",
                databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/"
            };

            firebase.initializeApp(firebaseConfig);
            const rtdb = firebase.database();

            // جلب البيانات من قسم "mustafa" أو "hussouni" (حسب ما تستخدمه في لوحة الإدارة)
            rtdb.ref('luxVaipData/mustafa/products').on('value', (snapshot) => {
                const grid = document.getElementById('customer-grid');
                grid.innerHTML = '';

                if (snapshot.exists()) {
                    const products = snapshot.val();
                    products.forEach((p) => {
                        const isAvailable = p.qty > 0;
                        grid.innerHTML += `
                        <div class="product-card rounded-[2.5rem] shadow-2xl ${!isAvailable ? 'out-of-stock' : ''}">
                            ${!isAvailable ? '<div class="stock-badge">نفذت الكمية ❌</div>' : ''}
                            <img src="${p.img}" class="w-full h-72 object-cover">
                            <div class="p-7"><h4 class="text-2xl font-bold mb-2">${p.name}</h4>
                                <p class="text-gray-400 text-sm mb-6 h-12 overflow-hidden line-clamp-2 italic">${p.desc || 'لا يوجد وصف متاح.'}</p>
                                <div class="flex justify-between items-center">
                                    <div class="price-tag px-4 py-2 rounded-2xl font-black text-xl">
                                        ${p.sell.toLocaleString()} <span class="text-[10px]">د.ع</span>
                                    </div>
                                    ${isAvailable ?
                                `<button onclick="sendOrder('${p.name}', '${p.sell}')" class="whatsapp-btn text-white px-6 py-3 rounded-2xl font-bold flex items-center gap-2 hover:scale-105 transition-all">
                                            <i class="fab fa-whatsapp text-xl"></i> اطلب
                                        </button>` :
                                <button disabled class="bg-slate-700 text-slate-500 px-6 py-3 rounded-2xl font-bold cursor-not-allowed italic">مباع 📦</button>
                            }
                                </div>
                            </div>
                        </div>`;
                    });
                } else {
                    grid.innerHTML = '<div class="col-span-full text-center text-gray-500">لا توجد بضاعة حالياً.</div>';
                }
            });

            function sendOrder(name, price) {
                // الرقم المحدث الخاص بك
                const phone = "9647807483170";
                const message = مرحباً lux_vaip 🌟\nأريد طلب المنتج التالي: \n━━━━━━━━━━━━\n📦 الاسم: ${ name }\n💰 السعر: ${ price } د.ع\n━━━━━━━━━━━━\nيرجى تأكيد التوافر وطريقة التوصيل.;
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
            }
        </script>
    </body>

</html>
