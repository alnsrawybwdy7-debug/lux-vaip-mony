<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LUX_VAIP STORE ☁️</title>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

            body {
                font-family: 'Tajawal', sans-serif;
                background: #0f172a;
                color: white;
            }

            .product-card {
                background: #1e293b;
                border: 1px solid #334155;
                transition: 0.3s;
                position: relative;
            }

            .out-of-stock {
                opacity: 0.4;
                filter: grayscale(1);
            }

            .owner-tag {
                position: absolute;
                top: 12px;
                left: 12px;
                background: #4f46e5;
                color: white;
                padding: 2px 8px;
                border-radius: 6px;
                font-size: 10px;
                z-index: 10;
                font-weight: bold;
            }
        </style>
    </head>

    <body class="pb-12 text-center">

        <header class="p-6 border-b border-slate-800 bg-slate-900/95 sticky top-0 z-50 backdrop-blur-md">
            <h1 class="text-3xl font-black mb-4 tracking-tighter italic">LUX<span class="text-indigo-500">_</span>VAIP
            </h1>
            <div class="max-w-md mx-auto relative">
                <input type="text" id="search-box" oninput="filterProducts()" placeholder="ابحث عن نكهة أو جهاز..."
                    class="w-full bg-slate-800 border border-slate-700 rounded-xl py-2 px-10 text-sm outline-none focus:border-indigo-500 text-white">
                <i class="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
            </div>
        </header>

        <main class="container mx-auto px-4 mt-8">
            <div id="customer-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="col-span-full py-10 text-gray-500 italic">جاري جلب البضاعة من المخازن...</p>
            </div>
        </main>

        <script>
            const firebaseConfig = {
                apiKey: "AIzaSyBlmUZlz9Qg8346vU92vNg9jDFQCH06Gpc",
                authDomain: "lux-vaip.firebaseapp.com",
                projectId: "lux-vaip",
                storageBucket: "lux-vaip.firebasestorage.app",
                messagingSenderId: "958955103630",
                appId: "1:958955103630:web:1d3f7f94466021d57b70df",
                measurementId: "G-NET3PPRG11",
                databaseURL: "https://lux-vaip-default-rtdb.firebaseio.com/"
            };

            firebase.initializeApp(firebaseConfig);
            const rtdb = firebase.database();
            let allProducts = [];

            // السحب المباشر (Real-time)
            rtdb.ref('luxVaipData').on('value', (snapshot) => {
                const grid = document.getElementById('customer-grid');
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    allProducts = [];

                    // دمج بضاعة مصطفى وحسوني
                    ['mustafa', 'hussouni'].forEach(user => {
                        if (data[user] && data[user].products) {
                            data[user].products.forEach(p => allProducts.push({ ...p, owner: user === 'mustafa' ? 'مصطفى' : 'حسوني' }));
                        }
                    });
                    renderProducts(allProducts);
                } else {
                    grid.innerHTML = '<p class="col-span-full py-10">المخزن فارغ حالياً</p>';
                }
            });

            function renderProducts(list) {
                const grid = document.getElementById('customer-grid');
                grid.innerHTML = '';
                list.forEach((p) => {
                    const isAvailable = p.qty > 0;
                    grid.innerHTML += `
                    <div class="product-card rounded-3xl p-4 ${!isAvailable ? 'out-of-stock' : ''}">
                        <div class="owner-tag italic">مخزن ${p.owner}</div>
                        <img src="${p.img}" class="w-full h-64 object-cover rounded-2xl mb-4">
                        <h4 class="text-xl font-bold mb-2">${p.name}</h4>
                        <div class="flex justify-between items-center px-2">
                            <span class="text-indigo-400 font-black">${p.sell.toLocaleString()} د.ع</span>
                            ${isAvailable ? <button onclick="sendOrder('${p.name}','${p.sell}','${p.owner}')" class="bg-green-600 px-4 py-2 rounded-lg text-xs font-bold">اطلب</button> : '<span>مباع</span>'}
                        </div>
                    </div>`;
                });
            }

            function filterProducts() {
                const term = document.getElementById('search-box').value.toLowerCase();
                const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
                renderProducts(filtered);
            }

            function sendOrder(n, s, o) {
                window.open(`https://wa.me/9647807483170?text=${encodeURIComponent('أريد طلب المنتج: ' + n + '\nالسعر: ' + s + '\nالمخزن: ' + o)}`);
            }
        </script>
    </body>

</html>
